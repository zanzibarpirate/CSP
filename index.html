    {id:"5.3",q:"Determine the values of acceleration site coefficient Fa and velocity site coefficient Fv for a building located in Site Class C and with Ss = 0.85 and S1 = 0.4?",opts:{"A":"1.04 and 1.5","B":"1.2 and 1.5","C":"1.5 and 1.2","D":"1.16 and 1.6"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-8",exp:""},
    {id:"5.4",q:"Determine the risk-targeted maximum considered earthquake design spectral response acceleration parameters for the short and 1 second period, respectively, for a building located in Site Class C with Ss = 0.70 and S1 = 0.25?",opts:{"A":"1.03 and 0.64","B":"0.854 and 0.375","C":"0.569 and 0.25","D":"1.03 and 0.43"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-8",exp:""},
    {id:"5.5",q:"What are the values of SDS and SD1 for a building located in Site Class D (determined using measured soil properties). Ss = 1.12 and S1 = 0.35? Use the General Procedure of ASCE 7.",opts:{"A":"1.01 and 0.46","B":"0.78 and 0.46","C":"0.67 and 0.91","D":"1.18 and 0.68"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-87",exp:""},
    {id:"5.6",q:"A building site has vs = 2,400 ft/sec., and MCER mapped spectral response parameters of 0.95 and 0.48. What are the values of SDS and SD1?",opts:{"A":"0.76 and 0.48","B":"0.65 and 0.68","C":"0.76 and 0.72","D":"0.97 and 0.48"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-87",exp:""},
    {id:"5.7",q:"Determine the constant acceleration and constant velocity transition periods, T0, and Ts, respectively? SDS equal 0.65, and SD1 equal 0.46.",opts:{"A":"0.20 sec. and 0.60 sec.","B":"0.14 sec. and 0.60 sec.","C":"0.14 sec. and 0.71 sec.","D":"0.20 sec. and 0.71 sec."},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-87",exp:""},
    {id:"5.8",q:"Determine the constant acceleration and constant velocity transition periods, T0, and Ts, respectively? SDS equal 0.9, and SD1 equal 0.4.",opts:{"A":"0.20 sec. and 0.44 sec.","B":"0.20 sec. and 0.75 sec.","C":"0.10 sec. and 0.75 sec.","D":"0.10 sec. and 0.44 sec."},ans:"D",type:"calc",source:"AEI CH05 MCQ Pg.5-87",exp:""},
    {id:"5.9",q:"Determine the long period transition period, TL, for a California building location that has the following coordinates: (40.00°) North and (120.00°) West?",opts:{"A":"1.00 sec.","B":"8.00 sec.","C":"12.00 sec.","D":"16.00 sec."},ans:"B",type:"code",source:"AEI CH05 MCQ Pg.5-87",exp:""},
    {id:"5.10",q:"Determine the approximate fundamental period of a 120 ft tall concrete moment frame?",opts:{"A":"1.19 sec.","B":"1.29 sec.","C":"1.39 sec.","D":"1.49 sec."},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-88",exp:""},
    {id:"5.11",q:"What is the approximate fundamental period of a 180 ft tall steel eccentrically braced frame?",opts:{"A":"1.25 sec.","B":"1.47 sec.","C":"1.91 sec.","D":"1.97 sec."},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-88",exp:""},
    {id:"5.12",q:"Determine the approximate fundamental period of a steel moment resisting frame building? The building has a height of 270 ft including 10 ft penthouse.",opts:{"A":"2.10 sec.","B":"2.16 sec.","C":"2.39 sec.","D":"2.46 sec."},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-88",exp:""},
    {id:"5.13",q:"What is the approximate fundamental period of a masonry shear wall building? The building has a height of 55 ft. Use ASCE 7 Eq. 12.8-7.",opts:{"A":"0.30 sec.","B":"0.40 sec.","C":"0.45 sec.","D":"0.55 sec."},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-88",exp:""},
    {id:"5.14",q:"Determine the approximate fundamental period of a 9 story building using moment resisting frame? The first 3 stories have a height of 12 ft, whereas the remaining 6 stories have a height of 9 ft.",opts:{"A":"0.90 sec.","B":"0.95 sec.","C":"1.00 sec.","D":"1.10 sec."},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-89",exp:""},
    {id:"5.15",q:"Steel buckling-restrained braced frame building with 96 ft height above the base. What is the maximum period of vibration allowed by ASCE 7 if the period of vibration is determined from a Modal Dynamic Analysis? SD1 = 0.5.",opts:{"A":"0.92 sec.","B":"1.29 sec.","C":"2.40 sec.","D":"no limit"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-89",exp:""},
    {id:"5.16",q:"For a steel moment frame building with height equal 260 ft., what is the maximum period of vibration allowed by ASCE 7 for use in the design, if the period of vibration determined from a Modal Analysis equal 3.1 sec.? SD1 = 0.42.",opts:{"A":"2.40 sec.","B":"3.00 sec.","C":"3.10 sec.","D":"3.35 sec."},ans:"D",type:"calc",source:"AEI CH05 MCQ Pg.5-89",trap:true,exp:""},
    {id:"5.17",q:"Determine the Seismic Design Category SDC of a high rise office building located on a Site Class C with mapped MCER spectral response acceleration parameters of 1.6 and 0.6 respectively. The office building has an occupant load of 10,000.",opts:{"A":"SDC = B","B":"SDC = C","C":"SDC = D","D":"SDC = E"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-89",exp:""},
    {id:"5.18",q:"What is the Seismic Design Category SDC of an essential facility building (RC = IV) located on a Site Class D (determined from measured soil properties). Given Ss = 1.25 and S1 = 0.42 using the General Procedure.",opts:{"A":"SDC = B","B":"SDC = C","C":"SDC = D","D":"SDC = E"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-90",exp:""},
    {id:"5.19",q:"Determine the Seismic Design Category SDC of a college building that has a capacity of 1000 students located on a Site Class E with mapped spectral response acceleration parameter for long period (1 sec.) of 0.9 and design spectral response acceleration parameters of 1.2 and 0.95 respectively, determined using ASCE 7 ground motion hazard analysis (GMHA).",opts:{"A":"SDC = B","B":"SDC = C","C":"SDC = D","D":"SDC = E"},ans:"D",type:"calc",source:"AEI CH05 MCQ Pg.5-90",exp:""},
    {id:"5.20",q:"Which of the following represents the Seismic Design Category SDC of an agricultural facility located on a Site Class C, with mapped MCER spectral response acceleration parameters of 0.70 and 0.16 respectively.",opts:{"A":"SDC = A","B":"SDC = B","C":"SDC = C","D":"SDC = D"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-90",exp:""},
    {id:"5.21",q:"Which of the following statements is correct for a building frame system composed of space frame and braced frame?",opts:{"A":"space frame resists gravity loads and braced frame resists seismic loads","B":"both space frame and braced frame share gravity and seismic loads proportioned to their relative stiffness","C":"building frame system is more redundant than a dual system","D":"building frame system has maximum height limit of 100 ft"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-90",exp:""},
    {id:"5.22",q:"Which of the following seismic force resisting systems can be considered as a dual system in the same lateral direction?",opts:{"A":"eccentrically braced frame resisting more than 25% of seismic forces and shear wall","B":"moment frame capable of resisting more than 25% of seismic loads and shear wall","C":"concentrically braced frame capable of resisting 25% of seismic forces and shear wall","D":"masonry shear wall and reinforced concrete shear wall"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-91",exp:""},
    {id:"5.23",q:"Which of the following seismic force resisting systems best describes a structural system where light frame shear walls support the building's vertical gravity loads in addition to the lateral loads?",opts:{"A":"building frame system","B":"bearing wall system","C":"dual system","D":"shear wall frame interactive system"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-91",exp:""},
    {id:"5.24",q:"For a steel special truss moment frame building with SDC = E, what is the height limit of the building according to ASCE 7 Table 12.2-1?",opts:{"A":"65 ft","B":"100 ft","C":"160 ft","D":"no limit"},ans:"B",type:"code",source:"AEI CH05 MCQ Pg.5-91",trap:true,exp:""},
    {id:"5.25",q:"What is the height limit of an emergency medical building that has steel eccentrically braced frames? The building is assigned seismic design category F.",opts:{"A":"65 ft","B":"100 ft","C":"160 ft","D":"no limit"},ans:"C",type:"code",source:"AEI CH05 MCQ Pg.5-91",exp:""},
    {id:"5.26",q:"For a building that uses light frame wood shear walls with wood structural panel sheathing with SDC = F, what is the height limit of the building according to ASCE-7 Table 12.2-1?",opts:{"A":"65 ft","B":"100 ft","C":"not permitted","D":"no limit"},ans:"A",type:"code",source:"AEI CH05 MCQ Pg.5-92",exp:""},
    {id:"5.27",q:"The response modification coefficient, R, is used to indicate which of the following?",opts:{"A":"ability of the building to deform inelastically and dissipate earthquake energy","B":"ratio of the theoretical seismic base shear which would develop in a linear elastic system, to the code prescribed design base shear","C":"observed performance of specific materials and structural systems in past earthquakes","D":"All of the above"},ans:"D",type:"concept",source:"AEI CH05 MCQ Pg.5-92",exp:""},
    {id:"5.28",q:"Which of the following statements best describes the overstrength factor, Ω0?",opts:{"A":"accounts for the redistribution of the seismic forces after reaching over the strength of the system","B":"accounts for the maximum force that can be developed in the structure at the formation of the inelastic collapse mechanism","C":"accounts for the elastic response force reduced to account for the inelastic behavior of the member","D":"accounts for the larger-than-anticipated displacement exhibited by the structure when subjected to the design ground motions"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-92",exp:""},
    {id:"5.29",q:"Which of the following statements is correct for the deflection amplification factor, Cd?",opts:{"A":"determines the actual displacement of the building due to the prescribed code force, V","B":"determines the amplified displacement of the building due to the P-\u0394 effect","C":"determines the actual inelastic response displacement exhibited by the structure when subjected to the design ground motions","D":"determines the amplified displacement of the building in the case of a fully elastic response"},ans:"C",type:"concept",source:"AEI CH05 MCQ Pg.5-92",exp:""},
    {id:"5.30",q:"Which of the following seismic force resisting systems has the most ductility?",opts:{"A":"intermediate reinforced concrete moment frame","B":"light frame wood bearing wall sheathed with wood structural panels","C":"special reinforced masonry shear walls","D":"steel ordinary concentrically braced frame"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-93",exp:""},
    {id:"5.31",q:"Given a 100 ft tall multi-story college building (SDC = E) that uses steel intermediate moment frames (designed to carry more than 25% of seismic loads) with special reinforced concrete shear walls as the SFRS. What is the response modification factor, R, and overstrength factor, Ω0?",opts:{"A":"6.5, 2.5","B":"7, 2.5","C":"6, 2.5","D":"4.5, 3"},ans:"B",type:"code",source:"AEI CH05 MCQ Pg.5-93",exp:""},
    {id:"5.32",q:"Given the same building as 5.31. What is the height limit and the deflection amplification factor, Cd?",opts:{"A":"not permitted, 4","B":"no limit, 5.5","C":"100 ft, 5","D":"100 ft, 5.5"},ans:"D",type:"code",source:"AEI CH05 MCQ Pg.5-93",exp:""},
    {id:"5.33",q:"Given the same building as 5.31. What is the approximate period, Ta, of the building?",opts:{"A":"0.38 sec.","B":"0.40 sec.","C":"0.54 sec.","D":"0.63 sec."},ans:"D",type:"calc",source:"AEI CH05 MCQ Pg.5-93",exp:""},
    {id:"5.34",q:"Given a 3 story building with special reinforced masonry shear walls (bearing walls) in the North-South direction and steel ordinary concentrically braced frames in the East-West direction. What is the response modification coefficient, R, that should be used for the design of the North-South and East-West directions, respectively?",opts:{"A":"3.5, 6","B":"3.5, 3.25","C":"5, 3.25","D":"4.5, 6"},ans:"C",type:"code",source:"AEI CH05 MCQ Pg.5-94",exp:""},
    {id:"5.35",q:"Given the same building as 5.34. What is the overstrength factor, Ω0, that should be used for the design of the North-South and East-West directions, respectively?",opts:{"A":"3, 3.25","B":"3.5, 3.25","C":"2.5, 2.5","D":"2.5, 2"},ans:"D",type:"code",source:"AEI CH05 MCQ Pg.5-94",exp:""},
    {id:"5.36",q:"Given a 5 story building assigned to SDC = D. The building uses seismic force resisting system composed of steel special moment frame in the first story and steel special concentrically braced frames in the upper 4 stories. What is the response modification coefficient, R, that should be used for the design of the first story, and fifth story, respectively?",opts:{"A":"6, 6","B":"8, 8","C":"6, 8","D":"8, 6"},ans:"A",type:"code",source:"AEI CH05 MCQ Pg.5-94",exp:""},
    {id:"5.37",q:"Given the same building as 5.36. What is the overstrength factor, Ω0, that should be used for the design of the first story, and fifth story, respectively?",opts:{"A":"1.25, 2.0","B":"2.0, 3.0","C":"2.0, 2.5","D":"2.0, 2.0"},ans:"D",type:"code",source:"AEI CH05 MCQ Pg.5-94",exp:""},
    {id:"5.38",q:"Given the same building as 5.36. What is the deflection amplification factor, Cd, that should be used for determining the displacement of the first story, and fifth story, respectively?",opts:{"A":"3.25, 5.0","B":"5.0, 5.0","C":"5.5, 5.0","D":"5.5, 5.5"},ans:"C",type:"code",source:"AEI CH05 MCQ Pg.5-95",exp:""},
    {id:"5.39",q:"Given a 2 story building assigned to SDC = C. The building uses seismic force resisting system in the North-South direction composed of steel special moment frames at the exterior sides of the building, and steel special plate shear walls at all of the inside lines of resistance. Moment frames are designed to resist 20% of the base shear, V, in the North-South direction. What is the response modification coefficient, R, that should be used for the design of the North-South direction?",opts:{"A":"6","B":"7","C":"7.5","D":"8"},ans:"B",type:"code",source:"AEI CH05 MCQ Pg.5-95",trap:true,exp:""},
    {id:"5.40",q:"Given the same building as 5.39. What is the overstrength factor, Ω0, that should be used for the design of the North-South direction?",opts:{"A":"2.0","B":"2.25","C":"2.5","D":"3.0"},ans:"C",type:"code",source:"AEI CH05 MCQ Pg.5-95",exp:""},
    {id:"5.41",q:"Which of the following statements is correct for the soft story vertical irregularity?",opts:{"A":"story lateral strength is less than 70% of the story above, or less than 80% of the average of the three stories above","B":"story lateral strength is less than 60% of the story above, or less than 70% of the average of the three stories above","C":"story lateral stiffness is less than 70% of the story above, or less than 80% of the average of the three stories above","D":"story lateral stiffness is less than 60% of the story above, or less than 70% of the average of the three stories above"},ans:"C",type:"concept",source:"AEI CH05 MCQ Pg.5-96",trap:true,exp:""},
    {id:"5.42",q:"Which of the following statements is correct for Type 5 horizontal irregularity according to ASCE 7 Table 12.3-1?",opts:{"A":"both plan projections beyond a corner more than 15% of corresponding dimension","B":"open area in a diaphragm more than 50% of gross enclosed area","C":"vertical lateral force resisting elements are non-parallel to major axes","D":"horizontal offset of lateral forces resisting elements"},ans:"C",type:"concept",source:"AEI CH05 MCQ Pg.5-96",exp:""},
    {id:"5.43",q:"Extreme weak story vertical irregularity is defined by which of the following percentage of a story strength to the strength of the story above it?",opts:{"A":"65%","B":"70%","C":"80%","D":"none of the above"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-96",exp:""},
    {id:"ME-1",q:"Figure shows a plan view of the first and second floor of a building including the vertical SFR shear walls (shear walls on perimeter in first floor; interior shear wall only in second floor, shifted from first floor). Which of the following represents the type of irregularities that exist in the building shown?",opts:{"A":"Non-parallel horizontal irregularity","B":"Out-of-plane offset horizontal irregularity","C":"In-plane offset vertical irregularity","D":"Geometric discontinuity vertical irregularity"},ans:"C",type:"concept",source:"AEI Mini Exam Ch.5 Pg.2 (Spring 2025)",exp:""},
    {id:"ME-2",q:"A 5-story office building (RC = II) uses special reinforced concrete shear walls as SFRS. Effective seismic weight: w1=w2=w3=w4=80 kips, w5(roof)=60 kips. Story heights all 15 ft. Cs = 0.36. Story shear as % of base shear: Story 1=100%, Story 2=94%, Story 3=83%, Story 4=64%, Story 5(top)=37%. Determine the overturning moment at level 1, M1.",opts:{"A":"5,077 kips.ft","B":"5,705 kips.ft","C":"7,757 kips.ft","D":"9,757 kips.ft"},ans:"B",type:"calc",source:"AEI Mini Exam Ch.5 Pg.3 (Spring 2025)",exp:""},
    {id:"ME-3",q:"An elevated tank is deflected as shown. W = 10 kips, F = 3 kips, lateral deflection = 4 inches, H = 15 ft. What is the ratio between the secondary moment to the primary moment (P-delta ratio)?",opts:{"A":"0.07","B":"0.09","C":"0.11","D":"0.25"},ans:"C",type:"calc",source:"AEI Mini Exam Ch.5 Pg.4 (Spring 2025)",exp:""},
    {id:"ME-4",q:"Determine the Seismic Design Category SDC of a two story structure that hosts a police station in the first story and a public library in the second story. The structure is located on a Site Class D with mapped MCER spectral response acceleration parameters of Ss = 0.9 and S1 = 0.4 respectively.",opts:{"A":"SDC = B","B":"SDC = C","C":"SDC = D","D":"SDC = E"},ans:"C",type:"calc",source:"AEI Mini Exam Ch.5 Pg.4 (Spring 2025)",exp:""},
    {id:"ME-5",q:"A 3-story special reinforced concrete shear wall building assigned to SDC = E, is used for post earthquake emergency operations (RC = IV). Story height = 14 ft. Interior components designed to accommodate story drift. What is the maximum theoretical elastic displacement at level 1, δe1, to meet ASCE 7 drift limitation?",opts:{"A":"\u03b4e1 = 0.76 in.","B":"\u03b4e1 = 2.0 in.","C":"\u03b4e1 = 2.52 in.","D":"\u03b4e1 = 4.20 in."},ans:"A",type:"calc",source:"AEI Mini Exam Ch.5 Pg.5 (Spring 2025)",exp:""},
    {id:"ME-6",q:"Building shown has relative story strengths: S4=0.60, S3=0.60, S2=1.35, S1=1.10. Building is 3×30=90 ft wide. Shear walls at perimeter of floors 1-3 only (interior shear wall added at floor 2 only, not extending to floor 1 or floor 4). Which of the following represents the type of vertical irregularities that exist?",opts:{"A":"I (weak story Type 5) & II (geometric Type 3)","B":"I (weak story) & III (in-plane offset Type 4)","C":"II (geometric Type 3) & III (in-plane offset Type 4)","D":"I, II & III"},ans:"C",type:"concept",source:"AEI Mini Exam Ch.5 Pg.6 (Spring 2025)",exp:""},
    {id:"ME-7",q:"A 2-story emergency vehicle garage (RC = IV) with special reinforced concrete moment frames. Story heights = 16 ft. Lateral forces: F2=36 kips (top), F1=18 kips. Story stiffnesses: k2=45 kips/in, k1=60 kips/in. Seismic weights: W2=80 kips, W1=140 kips. Determine the 2nd story drift.",opts:{"A":"2.0 in.","B":"2.9 in.","C":"3.3 in.","D":"4.4 in."},ans:"C",type:"calc",source:"AEI Mini Exam Ch.5 Pg.7 (Spring 2025)",exp:""},
    {id:"ME-8",q:"Figure shows three buildings in a valley. Soil boring logs show: Building A at elev +50 ft (above GWT) — medium sand vs=800 ft/s, soft clay vs=200 ft/s, loose sand vs=100 ft/s extending below elev 0. Building B at elev +85 ft — medium clay vs=550 ft/s. Building C at elev +100 ft — dense sand vs=1500 ft/s. Which building sites can be classified as Site Class E, according to ASCE 7?",opts:{"A":"Building A","B":"Building B and Building A","C":"Building C and Building A","D":"Building B and Building C"},ans:"B",type:"calc",source:"AEI Mini Exam Ch.5 Pg.8 (Spring 2025)",exp:""},
    {id:"ME-9",q:"Table lists effective seismic weight W at different levels for four 6-story buildings, each with height <160 ft. Level weights (kips): Bldg A: roof=600,5=1400,4=1400,3=1400,2=2000,1=2400. Bldg B: roof=600,5=1000,4=1000,3=1000,2=1000,1=1600. Bldg C: roof=800,5=900,4=1200,3=1200,2=1400,1=1800. Bldg D: roof=900,5=1000,4=1100,3=1100,2=1100,1=1100. Which would require a dynamic analysis procedure (ELF NOT permitted)?",opts:{"A":"Building B","B":"Buildings A and B","C":"Building C","D":"Building D"},ans:"A",type:"concept",source:"AEI Mini Exam Ch.5 Pg.9 (Spring 2025)",exp:""},
    {id:"ME-10",q:"The redundancy factor ρ equals 1.3 for SDC = D, E, F buildings unless additional ASCE 7 requirements are met. No plan irregularity exists. Which of the following conditions does NOT meet the requirements to make ρ = 1.0?",opts:{"A":"Braced frame with loss of one brace resulting in 28% reduction in story strength for story resisting >35% of base shear","B":"Moment frame with loss of one beam at both ends resulting in 35% reduction in strength of a story resisting >35% of base shear","C":"Two equivalent seismic bays of shear walls located on the perimeter of a one story building on each side","D":"Three equivalent seismic bays of bearing walls on the perimeter of a one story building on each side for each story resisting >35% of base shear"},ans:"A",type:"concept",source:"AEI Mini Exam Ch.5 Pg.10 (Spring 2025)",exp:""},
    {id:"ME-11",q:"What does an increase in a SFRS's response modification coefficient, R, correlate to?",opts:{"A":"Increase in SFRS's absorption of seismic energy","B":"Increase in SFRS's displacement experienced during earthquake","C":"Decrease in SFRS's absorption of seismic energy","D":"Decrease in SFRS's displacement experienced during earthquake"},ans:"A",type:"concept",source:"AEI Mini Exam Ch.5 Pg.10 (Spring 2025)",exp:""},
    {id:"ME-12",q:"Which factor is NOT properly accounted for when the Engineer assumes Site Class D due to unavailable soil information or Geotechnical Report?",opts:{"A":"Potential for soil liquefaction","B":"Potential for higher ground water level","C":"Potential for soil resonance","D":"Potential for higher soil porosity"},ans:"A",type:"concept",source:"AEI Mini Exam Ch.5 Pg.11 (Spring 2025)",exp:""},
    {id:"ME-13",q:"Which of the following buildings meets the requirements of ASCE 7 §12.14 (Simplified Design Procedure)?",opts:{"A":"3-story shear wall building, RC = II, with weak story vertical irregularity","B":"2-story concentric braced frame building, RC = II, with in-plane offset irregularity","C":"3-story shear wall building, RC = II, with Seismic Design Category = E","D":"2-story eccentric braced frame building, RC = II, with Site Class E"},ans:"D",type:"concept",source:"AEI Mini Exam Ch.5 Pg.11 (Spring 2025)",exp:""},
    {id:"ME-14",q:"An engineering firm considers 3 alternatives for a 5-story office building (SDC=D, h=60 ft): A=steel BRBF, B=steel SCBF, C=special concrete moment frame. All have approximate periods Ta GREATER than Ts (in velocity-controlled region). Not considering R, which alternative requires the LEAST spectral acceleration Sa for design?",opts:{"A":"SFRS A (BRBF)","B":"SFRS B (SCBF)","C":"SFRS C (concrete MF)","D":"Not enough information"},ans:"C",type:"concept",source:"AEI Mini Exam Ch.5 Pg.12 (Spring 2025)",exp:""},
    {id:"ME-15",q:"A 4-story building subjected to dead, live and seismic loads. Column at first floor: PD=30k, PL=42k, QE=±54k (axial), ρ=1.3, SDS=0.9. Beam at first floor: MD=120 k-ft, ML=250 k-ft, ME=±160 k-ft, ρ=1.3. Using IBC §1605/ASCE 7 §2.3.6, determine the maximum POSITIVE bending moment at the beam.",opts:{"A":"425 kips.ft","B":"499 kips.ft","C":"552 kips.ft","D":"613 kips.ft"},ans:"D",type:"calc",source:"AEI Mini Exam Ch.5 Pg.13 (Spring 2025)",exp:""},
    {id:"ME-16",q:"Which of the following would result in a DECREASE of the seismically induced acceleration, Sa?",opts:{"A":"Increasing ductility","B":"Increasing redundancy","C":"Increasing damping","D":"All of the above"},ans:"C",type:"concept",source:"AEI Mini Exam Ch.5 Pg.14 (Spring 2025)",exp:""},
    {id:"ME-17",q:"Plans show SDS = 0.651 and SD1 = 0.37 for a Site Class C building. Site coefficients Fa = 1.2, Fv = 1.5. What were the mapped MCER spectral response acceleration parameters Ss and S1?",opts:{"A":"Ss = 0.81, S1 = 0.19","B":"Ss = 0.40, S1 = 0.19","C":"Ss = 0.81, S1 = 0.37","D":"Ss = 0.42, S1 = 0.37"},ans:"A",type:"calc",source:"AEI Mini Exam Ch.5 Pg.15 (Spring 2025)",exp:""},
    {id:"ME-18",q:"Two SFRS systems are compared: (1) Special reinforced masonry shear walls — BEARING WALL system, (2) Special reinforced masonry shear walls — BUILDING FRAME system. Which would be designed for higher shear force V, and by what percent?",opts:{"A":"Building frame system: 25% higher","B":"Bearing wall system: 25% higher","C":"Bearing wall system: 10% higher","D":"Building frame system: 10% higher"},ans:"B",type:"concept",source:"AEI Mini Exam Ch.5 Pg.15 (Spring 2025)",exp:""},
    {id:"ME-19",q:"Two buildings on same property. Building A: RC=III, dual system (SMRF+SCBF), SDC=D. Elastic displacements from ELF: δe1=0.36in, δe2=0.58in, δe3=0.75in (3 stories). Building B: RC=II, steel IMRF, SDC=D. Elastic displacements: δe1=0.53in, δe2=0.85in, δe3=1.2in, δe4=1.6in (4 stories). What is the required seismic separation?",opts:{"A":"3.3 in.","B":"4.8 in.","C":"5.8 in.","D":"6.6 in."},ans:"C",type:"calc",source:"AEI Mini Exam Ch.5 Pg.16 (Spring 2025)",exp:""},
    {id:"ME-20",q:"A shear wall building assigned to SDC = D is shown. ELF procedure is used to obtain the seismic lateral loads. Assume ρ = 1.3, SDS = 0.9. Wall A (non-parallel to principal axes) resists seismic forces from both N-S (40 kips) and E-W (32 kips) base shears plus gravity shear (55 kips down, 25 kips horizontal). What is the maximum seismic design force Eh parallel to Wall A?",opts:{"A":"40 kips","B":"44 kips","C":"49 kips","D":"65 kips"},ans:"C",type:"calc",source:"AEI Mini Exam Ch.5 Pg.17 (Spring 2025)",exp:""},
    {id:"ME-21",q:"A 12-story building has 4 different SFRS combined vertically: Stories 1-3: Special RC Shear walls (R=6, Cd=5). Stories 4-6: Special RC Moment Frame (R=8, Cd=5.5). Stories 7-9: Special RC Shear walls (R=6, Cd=5). Stories 10-12: Special RC Moment Frame (R=8, Cd=5.5). According to ASCE 7, what would be the R for the 6th story and Cd for the 12th story?",opts:{"A":"R6=8, Cd12=5.5","B":"R6=8, Cd12=4.0","C":"R6=6, Cd12=4.0","D":"R6=6, Cd12=5.5"},ans:"D",type:"code",source:"AEI Mini Exam Ch.5 Pg.18 (Spring 2025)",exp:""},
    {id:"ME-22",q:"Two-story building with concentric braced steel frames on East and West facades (SDC=D). V1=20 kips (story 1), V2=12 kips (story 2). Each facade has 2 bays of X-bracing. What is the redundancy factor in the N-S direction, ρN-S?",opts:{"A":"\u03c1N-S = 1.0","B":"\u03c1N-S = 1.1","C":"\u03c1N-S = 1.2","D":"\u03c1N-S = 1.3"},ans:"D",type:"calc",source:"AEI Mini Exam Ch.5 Pg.19 (Spring 2025)",exp:""},
    {id:"ME-23",q:"A building (SDC=D) uses Special RC Shear Walls as SFRS. Column A: PD=100 kips, PL=120 kips, QE=±70 kips axial, ρ=1.3, SDS=1.0. Area of public assembly (RC=III). Determine maximum axial compression force at Column A at Strength Design level.",opts:{"A":"291 kips","B":"330 kips","C":"351 kips","D":"435 kips"},ans:"C",type:"calc",source:"AEI Mini Exam Ch.5 Pg.20 (Spring 2025)",exp:""},
    {id:"ME-24",q:"Geotechnical investigation of top 100 ft shows: top 70 ft of soil layer with undrained shear strength Su = 1800 psf, and bottom 30 ft with plasticity index PI > 80. Using ASCE 7 general procedure, what is the soil site class?",opts:{"A":"Site Class = C","B":"Site Class = D","C":"Site Class = E","D":"Site Class = F"},ans:"C",type:"calc",source:"AEI Mini Exam Ch.5 Pg.21 (Spring 2025)",exp:""},
    {id:"PSW2-1",q:"A 160 ft tall (including 5 ft roof parapet) steel building, RC = III, uses steel eccentrically braced frames. Mapped MCER spectral response: Ss = 0.5, S1 = 0.2. No site class given. What is the seismic response coefficient, Cs, using the ELF procedure?",opts:{"A":"0.026","B":"0.038","C":"0.052","D":"0.062"},ans:"B",type:"calc",source:"AEI PSW #2 Pg.1 (Spring 2026)",exp:""},
    {id:"PSW2-2",q:"A 5-story steel special moment resisting frame building. Fundamental period T = 0.5 sec (k=1.0). Each story and roof weight = 50 kips. Story heights all 15 ft. If the seismic force at level 4 (F4) = 2.4 kips, what is the base shear V?",opts:{"A":"6.7 kips","B":"8.0 kips","C":"10.0 kips","D":"12.0 kips"},ans:"B",type:"calc",source:"AEI PSW #2 Pg.3 (Spring 2026)",exp:""}
  ,
    {id:"5.44",q:"Which of the following best represents type/s of horizontal irregularity/ies that exist/s in the shown plan view? [L-shaped plan: 90x90ft with 70x55ft notch, max story drift at one corner 2.5in, min corner 1.5in, δavg=2.0in, δmax=2.5in]",opts:{"A":"reentrant corner","B":"extreme torsional","C":"torsional and reentrant corner","D":"extreme torsional and reentrant corner"},ans:"C",type:"concept",source:"AEI CH05 MCQ Pg.5-97",exp:""},
    {id:"5.45",q:"Which of the following determines the vertical irregularity that exists on the four story moment frame building shown? [4-story MF: stories 1-3 each 100 kips weight, story 4 (ground) = 130 kips, 4×30=120 ft wide]",opts:{"A":"in-plane discontinuity","B":"vertical geometric irregularity","C":"mass irregularity","D":"no vertical irregularity"},ans:"C",type:"concept",source:"AEI CH05 MCQ Pg.5-97",exp:""},
    {id:"5.46",q:"Which of the following buildings has extreme soft story vertical irregularity? [Four building figures (A,B,C,D) showing different braced frame configurations — A: braces all stories, B: braces all but 2nd story, C: braces top 3 stories only, D: braces all but ground story]",opts:{"A":"A","B":"B","C":"C","D":"D"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-98",trap:true,exp:""},
    {id:"5.47",q:"Which of the following determines the irregularity that exists on the four story building frame shown? [4-story shear wall building: shear walls on left column only for stories 1-3, no wall story 4, wall continues left side but shifts between stories]",opts:{"A":"vertical irregularity - in-plane discontinuity in lateral strength","B":"vertical irregularity - geometric discontinuity","C":"horizontal irregularity - out-of-plane offset","D":"vertical irregularity - in-plane discontinuity of SFR element"},ans:"D",type:"concept",source:"AEI CH05 MCQ Pg.5-98",exp:""},
    {id:"5.48",q:"Which of the following statements is correct for Type 3 horizontal irregularity of ASCE 7 Table 12.3-1?",opts:{"A":"both plan projections beyond a corner more than 15% of corresponding dimension","B":"open area in a diaphragm more than 50% of gross enclosed area","C":"vertical lateral force resisting elements are non-parallel to major axes","D":"horizontal offset of lateral forces resisting elements"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-99",exp:""},
    {id:"5.49",q:"Which of the following Seismic Force Resisting Systems (SFRS) is NOT permitted as SDC = D?",opts:{"A":"moment frame with extreme torsion horizontal irregularity (Type 1-b)","B":"eccentric braced frame with extreme weak story vertical irregularity (Type 5-b)","C":"shear wall frame with out of plane offset horizontal irregularity (type 4)","D":"concentrically braced frame and moment frame resisting 25% of seismic loads (dual system) with extreme soft story vertical irregularity (Type 1-b)"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-99",trap:true,exp:""},
    {id:"5.50",q:"Which of the following Seismic Force Resisting Systems (SFRS) with horizontal and vertical irregularities is permitted as SDC = E?",opts:{"A":"moment frame with extreme torsion horizontal irregularity (Type 1-b)","B":"eccentric braced frame with extreme weak story vertical irregularity (Type 5-b)","C":"shear wall frame with out of plane offset horizontal irregularity (type 4)","D":"concentrically braced frame and moment frame resisting 25% of seismic loads (dual system) with extreme soft story vertical irregularity (Type 1-b)"},ans:"C",type:"concept",source:"AEI CH05 MCQ Pg.5-99",trap:true,exp:""},
    {id:"5.51",q:"Determine the total effective seismic weight, W, for a 3-story office building shown in Figure. Given: roof dead load = 20 psf, snow load = 40 psf, floor dead load = 40 psf. Building floor area equal 6000 ft² (100 ft × 60 ft). Assume all perimeter walls have total length of 320 ft with 30 psf weight. Story height = 16 ft each.",opts:{"A":"280 kips","B":"390 kips","C":"780 kips","D":"1152 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-100",exp:""},
    {id:"5.52",q:"Determine the total effective seismic weight, W, for a 2-story warehouse. Given: roof dead load = 20 psf, snow load = 25 psf, 2nd floor dead load = 40 psf, Live load = 250 psf. Story height equal 20 ft. Floor area = 1000 ft². Ignore weight of perimeter walls.",opts:{"A":"100 kips","B":"120 kips","C":"160 kips","D":"200 kips"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-100",exp:""},
    {id:"5.53",q:"A 4-story public assembly building (RC = III) uses special reinforced concrete shear walls as SFRS. S₁ = 0.65, SDS = 1.2, SD1 = 0.45, T = 0.46 sec. Story weights: W₁=120k, W₂=100k, W₃=100k, W₄=100k (W₄=roof). Determine the total effective seismic weight of the building.",opts:{"A":"100 kips","B":"120 kips","C":"420 kips","D":"520 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-101",exp:""},
    {id:"5.54",q:"Same building as 5.53 (RC=III, SDS=1.2, SD1=0.45, T=0.46, S₁=0.65, W=420k). Determine the base shear, V.",opts:{"A":"84 kips","B":"94 kips","C":"120 kips","D":"132 kips"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-101",exp:""},
    {id:"5.55",q:"Same building as 5.53-5.54. V = 84 kips, T = 0.46 sec. Heights: h₁=20ft, h₂=35ft, h₃=50ft, h₄=65ft. Determine the lateral seismic force at level 2, F₂.",opts:{"A":"12 kips","B":"17 kips","C":"24 kips","D":"31 kips"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-101",exp:""},
    {id:"5.56",q:"Same building 5.53-5.55. Determine the story shear at 2nd story, V₂.",opts:{"A":"17 kips","B":"29 kips","C":"73 kips","D":"84 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-102",exp:""},
    {id:"5.57",q:"Same building 5.53-5.56. Determine the overturning moment at level 1, M₁.",opts:{"A":"2140 kips.ft","B":"2390 kips.ft","C":"2560 kips.ft","D":"2870 kips.ft"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-102",exp:""},
    {id:"5.58",q:"Same building 5.53-5.57. RC=III. Determine the maximum allowable drift, Δₐ, for the 4th story, if the non-structural components are designed to accommodate story drift. Story height = 15 ft.",opts:{"A":"1.5 in.","B":"1.8 in.","C":"2.7 in.","D":"3.6 in."},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-102",exp:""},
    {id:"5.59",q:"A 3-story building (RC=II) uses steel special plate shear walls as SFRS (building frame). S₁=0.72, SDS=0.9, SD1=0.5. Seismic weights: W₁=W₂=W₃=70 kips. Story heights = 14 ft each. Elastic displacements: δe1=0.2in, δe2=0.7in, δe3=1.4in. Determine the base shear, V.",opts:{"A":"21 kips","B":"27 kips","C":"46 kips","D":"210 kips"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-103",exp:""},
    {id:"5.60",q:"Same building 5.59. V=27.09 kips, T=0.33 sec. Determine the 2nd story shear force, V₂.",opts:{"A":"22 kips","B":"27 kips","C":"32 kips","D":"45 kips"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-103",exp:""},
    {id:"5.61",q:"Same building 5.59-5.60. Determine the maximum overturning moment Mmax at the base.",opts:{"A":"751 kips.ft","B":"885 kips.ft","C":"920 kips.ft","D":"943 kips.ft"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-103",exp:""},
    {id:"5.62",q:"Same building 5.59-5.61. SPSW building frame: Cd=5.5, Ie=1.0. δe3=1.4 in. Determine the actual (inelastic-response) displacement at the roof level, δx.",opts:{"A":"1.4 in.","B":"4.2 in.","C":"8.4 in.","D":"11.2 in."},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-103",exp:""},
    {id:"5.63",q:"Same building 5.59-5.62. Determine the story drift for the 3rd story.",opts:{"A":"1.4 in.","B":"4.2 in.","C":"8.4 in.","D":"11.2 in."},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-103",exp:""},
    {id:"5.64",q:"Same building 5.59-5.63. RC=II, partitions and ceilings designed to accommodate story drift. Determine the maximum allowable drift, Δₐ, for the 3rd story.",opts:{"A":"4.2 in.","B":"6.2 in.","C":"8.4 in.","D":"11.2 in."},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-104",exp:""},
    {id:"5.65",q:"A 2-story emergency vehicle garage (RC=IV) with special reinforced concrete moment frames. S₁=0.8, SDS=1.2, SD1=0.55. Story weights: W₂=80k, W₁=140k. Story height=16ft. Story stiffness: k₁=k₂=45 kips/in. Determine the base shear, V.",opts:{"A":"15.4 kips","B":"22.0 kips","C":"49.5 kips","D":"62.9 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-104",exp:""},
    {id:"5.66",q:"Same building 5.65. V=49.5 kips, T=0.40 sec. Heights: h₁=16ft, h₂=32ft. Determine the lateral seismic force at level 2, F₂.",opts:{"A":"23.10 kips","B":"26.40 kips","C":"49.50 kips","D":"55.15 kips"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-104",exp:""},
    {id:"5.67",q:"Same building 5.65-5.66. V=49.5k, F₂=26.4k, F₁=23.1k, h₁=16ft, h₂=32ft. Determine the story shear at 1st story, V₁, and the overturning moment at level 1, M₁.",opts:{"A":"50 kips, 422 kips.ft","B":"50 kips, 1215 kips.ft","C":"23 kips, 422 kips.ft","D":"23 kips, 1215 kips.ft"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-105",exp:""},
    {id:"5.68",q:"Same building 5.65-5.67. SRCMF: Cd=5.5, Ie=1.5. k₁=k₂=45 kips/in. F₁=23.1k, F₂=26.4k. Determine the elastic displacement δxe at levels 1 and 2.",opts:{"A":"0.77 in., 1.57 in.","B":"1.10 in., 1.69 in.","C":"1.35 in., 2.02 in.","D":"1.65 in., 2.42 in."},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-105",exp:""},
    {id:"5.69",q:"Same building 5.65-5.68. Determine the 2nd story drift.",opts:{"A":"2.2 in.","B":"2.8 in.","C":"3.1 in.","D":"4.6 in."},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-105",exp:""},
    {id:"5.70",q:"Same building 5.65-5.69. RC=IV, ρ=1.0. Determine the maximum allowable drift, Δₐ, for the 2nd story.",opts:{"A":"1.9 in.","B":"2.8 in.","C":"3.1 in.","D":"4.6 in."},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-105",trap:true,exp:""},
    {id:"5.71",q:"Same building 5.65-5.70. V₁=49.5k, h₁=16ft, Cd=5.5, Ie=1.5, δe1=1.10in. Unfactored axial load at 1st story columns = 300 kips. Determine the stability coefficient, θ, for the 1st story.",opts:{"A":"0.004","B":"0.035","C":"0.050","D":"0.100"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-105",exp:""},
    {id:"5.72",q:"Same building 5.65-5.71. θ=0.035 from Q5.71. Shear demand-to-capacity ratio β=0.9. Determine the maximum stability coefficient, θmax.",opts:{"A":"0.05","B":"0.10","C":"0.20","D":"0.40"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-106",exp:""},
    {id:"5.73",q:"The P-Delta effect is best described by which of the following definitions?",opts:{"A":"additional moment and shear on a building's column produced by the axial load acting on the laterally displaced column","B":"additional axial load on a building's column produced by the laterally displaced column","C":"amplified story deflection resulting from increased seismic force in excess of code prescribed values","D":"none of the above"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-106",exp:""},
    {id:"5.74",q:"The P-Delta effect is most critical in which of the following conditions?",opts:{"A":"wood shear wall","B":"concrete moment frame","C":"steel braced frame","D":"masonry shear wall"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-106",exp:""},
    {id:"5.75",q:"The P-Delta effect need not to be considered in the design of a building's column when which of the following conditions exist?",opts:{"A":"stability coefficient, θ, is less than or equal to θmax","B":"stability coefficient, θ, is less than or equal to 10%","C":"stability coefficient, θ, is less than or equal to 20%","D":"stability coefficient, θ, is larger than or equal to θmax"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-106",trap:true,exp:""},
    {id:"5.76",q:"A 12-story building (Building A) is to be constructed next to an existing 20-story building (Building B) on the same property. Both buildings have the same elastic displacement δxe at the 12th story top level. Building A has RC=II, Cd=4. Building B has RC=II, Cd=5.5. What is the minimum required separation between the two buildings?",opts:{"A":"2.0 δxe","B":"4.0 δxe","C":"5.0 δxe","D":"7.0 δxe"},ans:"D",type:"calc",source:"AEI CH05 MCQ Pg.5-107",exp:""},
    {id:"5.77",q:"A 15-story building is constructed next to the property line. The building is assigned RC=III and has steel eccentrically braced frame as SFRS. What is the minimum required setback from the property line, in terms of the elastic displacement δxe of the top level?",opts:{"A":"2.5 δxe","B":"3.3 δxe","C":"4.0 δxe","D":"7.0 δxe"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-107",exp:""},
    {id:"5.78",q:"Which of the following statements defines the Orthogonal Combinations Procedure of ASCE 7 §12.5?",opts:{"A":"combining 100% of seismic demands from one principal direction plus 30% of seismic demands from orthogonal principal direction","B":"combining square root of sum of squares for the seismic demands in two principal and orthogonal directions","C":"combining absolute values of the seismic demands in two principal and orthogonal directions","D":"none of the above"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-107",exp:""},
    {id:"5.79",q:"A corner column is part of the two orthogonal steel special moment frames in a building that has SDC = D. The column is subjected to the following seismic uplift as obtained from the ELF procedure performed independently in each direction: T_NS = 60 kips, and T_EW = 75 kips. What is the maximum seismic design uplift force, T?",opts:{"A":"68 kips","B":"83 kips","C":"93 kips","D":"96 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-108",exp:""},
    {id:"5.80",q:"Which of the following structures is NOT permitted to be analyzed using the Equivalent Lateral Force Analysis procedure? All structures are assigned to SDC = E, and their height above the base does not exceed 160 ft.",opts:{"A":"regular concrete shear wall structure","B":"concrete moment frame structure with horizontal irregularity Type 2","C":"steel buckling restrained braced frame structure with out of plane offset irregularity","D":"steel moment frame structure with soft story vertical irregularity"},ans:"D",type:"concept",source:"AEI CH05 MCQ Pg.5-108",trap:true,exp:""},
    {id:"5.81",q:"Which of the following structures requires dynamic analysis (i.e., NOT permitted to be analyzed using the Equivalent Lateral Force procedure)? All structures are assigned SDC = D, and Tₐ equal 0.7?",opts:{"A":"regular dual system with special concrete shear wall structure, structural height = 180 ft","B":"steel eccentric braced frame structure with out of plane offset irregularity, structural height = 80 ft","C":"regular steel moment frame structure, with structural height = 220 ft","D":"steel moment frame structure, structural height = 120 ft, with vertical geometric irregularity"},ans:"D",type:"concept",source:"AEI CH05 MCQ Pg.5-108",trap:true,exp:""},
    {id:"5.82",q:"A simple bearing wall building meeting all ASCE 7 §12.14 requirements. 2 stories above grade. RC=II, Ss=0.70, Site Class B, effective seismic weight for each story = 60 kips. Determine the Seismic Design Category of the building.",opts:{"A":"B","B":"C","C":"D","D":"E"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-109",exp:""},
    {id:"5.83",q:"Same building 5.82 (§12.14, 2-story BW, RC=II, Ss=0.70, Site B, w=60k each story). Determine the seismic base shear, V, using the simplified design procedure.",opts:{"A":"12.33 kips","B":"15.41 kips","C":"16.72 kips","D":"17.67 kips"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-109",exp:""},
    {id:"5.84",q:"Same building 5.82-5.83. V=15.41 kips. Determine the seismic design force at Level 2 (top story), F₂.",opts:{"A":"5.15 kips","B":"5.65 kips","C":"6.16 kips","D":"7.25 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-109",exp:""},
    {id:"5.85",q:"Which of the following techniques are used to reduce the seismic base shear demand on the structures?",opts:{"A":"seismic base isolation","B":"friction dampers","C":"plastic hinging at predetermined locations","D":"all of the above"},ans:"D",type:"concept",source:"AEI CH05 MCQ Pg.5-109",exp:""},
    {id:"5.86",q:"Base isolation is used to reduce the spectral acceleration imparted to the structure and hence reduce the seismic base shear demand. Which of the following soil conditions beneath the structure is most suitable to use this technique?",opts:{"A":"rock soil","B":"loose sandy soil","C":"soft clay","D":"none of the above"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-109",trap:true,exp:""},
    {id:"5.87",q:"Which of the followings is used as a passive energy dissipation technique to reduce the spectral acceleration imparted to the structure?",opts:{"A":"use of friction dampers","B":"assign plastic hinging at base of buildings","C":"base isolate building's foundation","D":"increase redundancy of the SFR system"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-110",exp:""},
    {id:"5.88",q:"Which of the following best represents the seismic effect, QE, on structural components of a building?",opts:{"A":"force in beam/column caused by the maximum horizontal seismic forces with overstrength as determined by the seismic base shear","B":"force in beam/column caused by vertical seismic forces as determined by the seismic base shear","C":"force in beam/column caused by horizontal seismic forces as determined by the seismic base shear","D":"QE is equivalent to the seismic base shear, V"},ans:"C",type:"concept",source:"AEI CH05 MCQ Pg.5-110",exp:""},
    {id:"5.89",q:"Which of the following statements represents the purpose of the redundancy factor, ρ, in the seismic load effects?",opts:{"A":"used as a penalty for seismic force resisting systems with lower ductility","B":"used as a penalty for seismic force resisting systems with lower stability","C":"used as a penalty for seismic force resisting systems with lower reliability","D":"used to increase the seismic load on the structure in the case of few seismic force resisting systems and no multiple path of resistance"},ans:"D",type:"concept",source:"AEI CH05 MCQ Pg.5-110",exp:""},
    {id:"5.90",q:"What is the value of the redundancy factor, ρ, for the horizontal seismic effect on a multi-story building assigned to SDC = B?",opts:{"A":"1.0","B":"1.1","C":"1.2","D":"1.3"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-110",exp:""},
    {id:"5.91",q:"What is the value of the redundancy factor, ρ, for the horizontal seismic effect on an office building assigned to SDC = D? The office building has plan irregularity.",opts:{"A":"1.0","B":"1.3","C":"1.4","D":"1.5"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-111",trap:true,exp:""},
    {id:"5.92",q:"What is the vertical seismic load effect, Ev, on the 2nd story column in a multi-story building? Dead load, D, is 60 kips, and SMS is 1.1.",opts:{"A":"±4.4 kips","B":"±5.5 kips","C":"±6.2 kips","D":"±8.8 kips"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-111",exp:""},
    {id:"5.93",q:"A multi-story office building has special moment resisting frames in both directions. ELF procedure determined: dead load D=120 kips (compression), floor live load L=60 kips (compression), horizontal seismic load effect QE=±45 kips. ρ=1.3, SDS=1.14, Ω₀=3. Determine the column's axial force resulting from the horizontal seismic forces (Eh).",opts:{"A":"±45.0 kips","B":"±58.5 kips","C":"±76.3 kips","D":"±90.0 kips"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-111",exp:""},
    {id:"5.94",q:"Same building 5.93 (D=120k, L=60k, QE=±45k, ρ=1.3, SDS=1.14). Determine the column's axial force resulting from vertical seismic forces (Ev).",opts:{"A":"±16.2 kips","B":"±19.2 kips","C":"±27.4 kips","D":"±33.4 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-111",exp:""},
    {id:"5.95",q:"Same building 5.93-5.94. Determine the column maximum axial compression using strength design load combinations per ASCE 7 §12.4.2.",opts:{"A":"260 kips","B":"295 kips","C":"316 kips","D":"330 kips"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-112",exp:""},
    {id:"5.96",q:"Same building 5.93-5.95. Determine the column minimum axial compression using strength design load combinations per ASCE 7 §12.4.2.",opts:{"A":"22 kips compression","B":"54.4 kips compression","C":"22 kips tension","D":"54.4 kips tension"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-112",exp:""},
    {id:"5.97",q:"Same building 5.93-5.96. Determine the column's axial force resulting from horizontal seismic forces using the overstrength factor (Em_horizontal).",opts:{"A":"±45.0 kips","B":"±58.5 kips","C":"±76.3 kips","D":"±135.0 kips"},ans:"D",type:"calc",source:"AEI CH05 MCQ Pg.5-112",exp:""},
    {id:"5.98",q:"Same building 5.93-5.97. Em=162.4 kips, D=120k, L=60k, f₁=0.5. Determine the column maximum axial compression using strength design load combinations INCLUDING overstrength factor per ASCE 7 §12.4.3.",opts:{"A":"336.4 kips","B":"367.2 kips","C":"398.6 kips","D":"442.1 kips"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-112",exp:""},
    {id:"5.99",q:"Same building 5.93-5.98. Determine the column minimum axial force using strength design SPECIAL seismic load combinations with overstrength factor (ASCE 7 §12.4.3).",opts:{"A":"54.4 kips Tension","B":"54.4 kips Compression","C":"215.6 kips Tension","D":"215.6 kips Compression"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-112",trap:true,exp:""},
    {id:"5.100",q:"Which of the following structural elements requires the use of ASCE 7 §12.4.3 load combination with overstrength factor?",opts:{"A":"elements with weak story vertical irregularity","B":"elements with torsional horizontal irregularity","C":"collector elements and their connections in a masonry structure with SDC = D","D":"all of the above conditions"},ans:"C",type:"concept",source:"AEI CH05 MCQ Pg.5-113",exp:""},
    {id:"5.101",q:"Geotechnical investigation of top 100 ft of two sites: Site A: undrained shear strength s_u = 1300 psf, average standard penetration resistance N = 52 blows/ft. Site B: undrained shear strength s_u = 300 psf, plasticity index PI = 24, moisture content w = 45%. Using the general procedure of ASCE 7, which statement is correct?",opts:{"A":"site A has Site Class C, site B has Site Class E","B":"site A has Site Class D, site B has Site Class F","C":"site A has Site Class C, site B has Site Class F","D":"site A has Site Class D, site B has Site Class E"},ans:"D",type:"calc",source:"AEI CH05 MCQ Pg.5-113",trap:true,exp:""},
    {id:"5.102",q:"A 240 ft tall building is assigned to SDC = E. Which of the following seismic force resisting system(s) are permitted? I. Special RC moment frame. II. Special RC shear wall. III. Dual system: SMRF with special RC shear wall. IV. Dual system: SMRF with BRBF.",opts:{"A":"I, II","B":"II, III, IV","C":"I, III, IV","D":"I, II, IV"},ans:"C",type:"code",source:"AEI CH05 MCQ Pg.5-113",trap:true,exp:""},
    {id:"5.103",q:"Which of the following combinations of SFRS along the same principal direction can be categorized as a Dual System? I. SMRF + special plate shear wall where MF resists 22% of seismic forces. II. SIMF + special RC shear wall where MF resists 30% of seismic forces. III. SSMF + special RC shear wall where MF resists 25% of seismic forces. IV. SIMF + BRBF where MF resists 25% of seismic forces.",opts:{"A":"III only","B":"I and II","C":"II and III","D":"III and IV"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-114",exp:""},
    {id:"5.104",q:"A 100 ft tall building (SDC=D) uses steel intermediate moment frames (designed to carry more than 25% of seismic loads) with special reinforced concrete shear walls. What is the height limit and the deflection amplification factor Cd?",opts:{"A":"not permitted, 4","B":"no limit, 5.5","C":"100 ft, 5","D":"100 ft, 5.5"},ans:"D",type:"code",source:"AEI CH05 MCQ Pg.5-114",exp:""},
    {id:"5.105",q:"A 6-story building (SDC=D) with steel special moment frames (SSMF) in both principal directions. RC=II, SDS=1.0, SD1=0.5. What is the minimum base shear coefficient Cs,min?",opts:{"A":"0.010","B":"0.044","C":"0.060","D":"0.100"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-114",exp:""},
    {id:"5.106",q:"Same building 5.105 (SDC=D, SSMF, RC=II, SDS=1.0, SD1=0.5, 6 stories, hn=78ft). What is the approximate fundamental period Ta and the upper limit Cu×Ta?",opts:{"A":"Ta=0.52 sec, Cu×Ta=0.73 sec","B":"Ta=0.92 sec, Cu×Ta=1.29 sec","C":"Ta=0.52 sec, Cu×Ta=2.08 sec","D":"Ta=1.08 sec, Cu×Ta=1.51 sec"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-115",exp:""},
    {id:"5.107",q:"Same building 5.105-5.106. Ta=0.52 sec, W=3000 kips. Using T=Ta, what is the seismic base shear V?",opts:{"A":"360 kips","B":"375 kips","C":"420 kips","D":"500 kips"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-115",exp:""},
    {id:"5.108",q:"A 4-story public assembly building (RC=III) uses steel EBF as SFRS (building frame system). SDC=D. The building is 4 stories and 64 ft tall. What is the maximum allowable story drift for stories 2-4 when non-structural components are NOT designed to accommodate story drift?",opts:{"A":"0.010 hsx","B":"0.015 hsx","C":"0.020 hsx","D":"0.025 hsx"},ans:"B",type:"code",source:"AEI CH05 MCQ Pg.5-115",trap:true,exp:""},
    {id:"5.109",q:"Same building 5.108. RC=III, SDC=D, steel EBF building frame: Cd=4, Ie=1.25. The elastic story drift from ELF = 0.22 in. Story height = 16 ft. Does the building comply with the story drift limit?",opts:{"A":"Δ=1.10 in. > 2.4 in. → complies","B":"Δ=1.10 in. < 2.4 in. → complies","C":"Δ=1.10 in. < 1.92 in. → complies","D":"Δ=1.38 in. > 2.4 in. → exceeds limit"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-115",exp:""},
    {id:"5.110",q:"A 3-story building shown in elevation and plan view. Roof DL=90 psf, snow=25 psf. Floor DL=125 psf. Storage LL=250 psf for floors 1 and 2. 3rd floor has permanent equipment=20 kips. All perimeter walls: concrete, unit wt=150 pcf, thickness=8 in, story ht=14 ft. Plan: 120 ft × 60 ft. Perimeter wall lengths shown in figure. Determine the total effective seismic weight W.",opts:{"A":"2880 kips","B":"3190 kips","C":"3740 kips","D":"5152 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-115",exp:""},
    {id:"5.111",q:"Same building 5.110. W=3740k. RC=III, SDS=1.0, SD1=0.5, steel EBF (R=8, Ie=1.25). hn=42 ft. Determine the base shear V.",opts:{"A":"147 kips","B":"203 kips","C":"234 kips","D":"280 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-116",exp:""},
    {id:"5.112",q:"Same building 5.110-5.111. V=234 kips, T=0.504 sec. Story weights from figure (W_roof, W_3, W_2, W_1). Determine the lateral seismic force at the roof level, F_roof.",opts:{"A":"53 kips","B":"72 kips","C":"89 kips","D":"107 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-116",exp:""},
    {id:"5.113",q:"A 2-story office building (RC=II, SDC=D) uses special RC shear walls. SDS=0.9, SD1=0.45. Seismic weights W₂=100k (roof), W₁=120k. Determine the approximate fundamental period Ta. Building height: h₁=12ft, h₂=24ft.",opts:{"A":"0.26 sec","B":"0.30 sec","C":"0.38 sec","D":"0.45 sec"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-116",exp:""},
    {id:"5.114",q:"Same building 5.113 (2-story office, RC=II, special RC SW, SDS=0.9, SD1=0.45, W₁=120k, W₂=100k). Ta=0.30 sec. What is the base shear V?",opts:{"A":"19.8 kips","B":"27.0 kips","C":"36.0 kips","D":"40.5 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-117",exp:""},
    {id:"5.115",q:"Same building 5.113-5.114. V=36k, T=0.30 sec. h₁=12ft, h₂=24ft. W₁=120k, W₂=100k. Determine the lateral force at level 1, F₁.",opts:{"A":"9.6 kips","B":"13.8 kips","C":"22.2 kips","D":"36.0 kips"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-117",exp:""},
    {id:"5.116",q:"Same building 5.113-5.115. Determine the story shear at the 1st story, V₁.",opts:{"A":"13.8 kips","B":"22.2 kips","C":"30.0 kips","D":"36.0 kips"},ans:"D",type:"calc",source:"AEI CH05 MCQ Pg.5-117",exp:""},
    {id:"5.117",q:"Same building 5.113-5.116. Special RC SW: Cd=5, Ie=1.0. Elastic displacements from analysis: δe1=0.18in, δe2=0.35in. Determine the design story drift at level 2 (2nd story).",opts:{"A":"0.85 in.","B":"1.75 in.","C":"0.86 in.","D":"1.00 in."},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-117",exp:""},
    {id:"5.118",q:"Same building 5.113-5.117. Δ₂=0.85in. h₂=12ft. Does the 2nd story drift comply? RC=II.",opts:{"A":"Δ=0.85in < 1.44in → OK","B":"Δ=0.85in < 2.88in → OK","C":"Δ=0.85in > 0.72in → NG","D":"Δ=0.85in < 3.6in → OK"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-118",exp:""},
    {id:"5.119",q:"A 3-story RC=IV building with special RC shear walls. SDS=1.0, SD1=0.55. Story ht=12ft each. Elastic story drifts: δe1=0.13in, δe2=0.25in, δe3=0.45in. Cd=5, Ie=1.5. Check if 3rd story drift complies with ASCE 7.",opts:{"A":"Δ₃=1.0in < 1.44in → OK","B":"Δ₃=1.0in < 1.2in → OK","C":"Δ₃=1.0in > 0.96in → NG","D":"Δ₃=1.0in > 1.2in → NG"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-118",exp:""},
    {id:"5.120",q:"Which of the following correctly describes the relationship between the deflection amplification factor Cd and the response modification coefficient R for special moment frames?",opts:{"A":"Cd < R always","B":"Cd = R always","C":"Cd > R always","D":"Cd and R are unrelated"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-118",exp:""},
    {id:"5.121",q:"For a building with a diaphragm force Fpx at level x per ASCE 7 §12.10.1.1, what are the minimum and maximum limits on Fpx?",opts:{"A":"min=0.1SDS Ie wpx, max=0.3SDS Ie wpx","B":"min=0.2SDS Ie wpx, max=0.4SDS Ie wpx","C":"min=0.3SDS Ie wpx, max=0.6SDS Ie wpx","D":"min=0.044SDS Ie wpx, max=0.4SDS Ie wpx"},ans:"B",type:"code",source:"AEI CH05 MCQ Pg.5-119",exp:""},
    {id:"5.122",q:"A 3-story building (RC=II): W₃=60k, W₂=80k, W₁=80k. V=50k. Story forces: F₃=24k, F₂=16k, F₁=10k. Determine the diaphragm design force Fpx at level 2.",opts:{"A":"10.0 kips","B":"16.0 kips","C":"20.0 kips","D":"26.0 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-119",exp:""},
    {id:"5.123",q:"A structure has been designed with SDS=0.8, SD1=0.4. Using the design response spectrum, determine the spectral acceleration Sa at T=0.6 sec.",opts:{"A":"0.55g","B":"0.67g","C":"0.80g","D":"0.40g"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-119",exp:""},
    {id:"5.124",q:"Same spectrum 5.123 (SDS=0.8, SD1=0.4). Determine Sa at T=0.1 sec.",opts:{"A":"0.32g","B":"0.54g","C":"0.64g","D":"0.80g"},ans:"D",type:"calc",source:"AEI CH05 MCQ Pg.5-119",exp:""},
    {id:"5.125",q:"Same spectrum 5.123-5.124. Determine Sa at T=0.04 sec.",opts:{"A":"0.32g","B":"0.54g","C":"0.64g","D":"0.80g"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-120",exp:""},
    {id:"5.126",q:"A building has SDS=1.0, SD1=0.5, TL=8 sec. At T=10 sec, what is the design spectral acceleration Sa?",opts:{"A":"0.04g","B":"0.05g","C":"0.40g","D":"0.50g"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-120",exp:""},
    {id:"5.127",q:"A 5-story building (RC=II, SDC=D) uses special steel moment frames. hn=65 ft, SDS=1.0, SD1=0.5. Using the approximate period formula, what is Cu×Ta (the upper limit on T)?",opts:{"A":"0.91 sec","B":"1.05 sec","C":"1.22 sec","D":"1.40 sec"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-120",exp:""},
    {id:"5.128",q:"Which of the following statements is correct about using the Modal Response Spectrum Analysis (MRSA) procedure?",opts:{"A":"MRSA requires at least 90% mass participation in each direction","B":"MRSA requires at least 75% mass participation in each direction","C":"MRSA can only be used for regular structures","D":"MRSA results do not require scaling to ELF base shear"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-121",exp:""},
    {id:"5.129",q:"When MRSA is used and the base shear from MRSA (Vt) is less than the required minimum, what scaling factor must be applied to all MRSA response quantities?",opts:{"A":"0.85×V_ELF / Vt","B":"V_ELF / Vt","C":"0.75×V_ELF / Vt","D":"1.10×Vt / V_ELF"},ans:"A",type:"concept",source:"AEI CH05 MCQ Pg.5-121",exp:""},
    {id:"5.130",q:"A building has an extreme torsional irregularity (Type 1b). The accidental eccentricity is 0.05b. The amplification factor Ax = [δmax/(1.2×δavg)]². If δmax=3.0 in and δavg=1.8 in, what is Ax?",opts:{"A":"1.00","B":"1.56","C":"1.93","D":"3.00"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-121",exp:""},
    {id:"5.131",q:"A building has SDS=0.9, SD1=0.45. The fundamental period from computer analysis T=1.5 sec. The approximate period Ta=0.8 sec. SD1=0.45 → Cu=1.4. What period should be used for design?",opts:{"A":"T=0.8 sec","B":"T=1.12 sec","C":"T=1.5 sec","D":"T=1.68 sec"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-122",trap:true,exp:""},
    {id:"5.132",q:"A building is assigned to SDC=E and uses a special steel concentrically braced frame (SCBF) as the SFRS. The building has a height of 120 ft. Is this permitted?",opts:{"A":"Yes — SCBF has no height limit in SDC E","B":"No — SCBF is limited to 160 ft in SDC E","C":"No — SCBF is limited to 100 ft in SDC E","D":"No — SCBF is not permitted in SDC E"},ans:"A",type:"code",source:"AEI CH05 MCQ Pg.5-122",exp:""},
    {id:"5.133",q:"For a 12-story building (SDC=D, hn=156 ft) with special RC shear walls (R=6, Cd=5, Ie=1.0): SDS=1.0, SD1=0.5. The approximate period Ta=0.58 sec. Is ELF permitted?",opts:{"A":"Yes — regular building, height ≤160 ft","B":"No — period exceeds 3.5 Ts","C":"No — height exceeds 100 ft for RC shear walls","D":"Yes — ELF is always permitted for shear wall buildings"},ans:"A",type:"code",source:"AEI CH05 MCQ Pg.5-122",exp:""},
    {id:"5.134",q:"A building has SDS=1.2, SD1=0.6, RC=IV (Ie=1.5), special RC MF (R=8). What is Cs?",opts:{"A":"0.150","B":"0.180","C":"0.225","D":"0.300"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-123",exp:""},
    {id:"5.135",q:"A 10-story RC=II office building uses special RC shear walls (R=6, Cd=5, Ie=1.0). SDS=0.9, SD1=0.45, S₁=0.65. hn=130ft. Ta=0.02×130^0.75=0.84 sec. Cu=1.4. W=8000k. What is V?",opts:{"A":"600 kips","B":"720 kips","C":"800 kips","D":"900 kips"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-123",exp:""},
    {id:"5.136",q:"Which of the following is a correct statement about the diaphragm force Fpx per ASCE 7 §12.10?",opts:{"A":"Fpx is the same as the story lateral force Fx","B":"Fpx can be less than 0.2SDS×Ie×wpx","C":"Fpx at the roof level is often the maximum diaphragm force in a multi-story building","D":"Fpx decreases linearly from base to roof"},ans:"C",type:"concept",source:"AEI CH05 MCQ Pg.5-123",exp:""},
    {id:"5.137",q:"A building with a horizontal torsional irregularity (Type 1a): floor dimensions 100ft × 60ft. Maximum story drift δmax=2.4in, minimum story drift δmin=0.8in. The building is assigned SDC=D. What is the amplified accidental eccentricity eax in the 100ft direction?",opts:{"A":"5.0 ft","B":"7.0 ft","C":"8.3 ft","D":"10.0 ft"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-124",exp:""},
    {id:"5.138",q:"A building has SDS=1.0, RC=II, and uses special RC shear walls. Story weights: W_roof=500k, W_3=700k, W_2=700k, W_1=700k. Base shear V=480k. Using ASCE 7 §12.10, determine the diaphragm force at level 3 (Fp3). Story forces: F_4=192k, F_3=144k, F_2=96k, F_1=48k.",opts:{"A":"144 kips","B":"168 kips","C":"196 kips","D":"240 kips"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-124",exp:""},
    {id:"5.139",q:"For a structure assigned to SDC=F with a special moment frame, which of the following analysis procedures is permitted?",opts:{"A":"Equivalent Lateral Force only","B":"Modal Response Spectrum Analysis only","C":"Nonlinear Response History Analysis only","D":"ELF, MRSA, or Nonlinear Response History Analysis (all permitted if regular)"},ans:"D",type:"concept",source:"AEI CH05 MCQ Pg.5-125",exp:""},
    {id:"5.140",q:"A building has a nonparallel system horizontal irregularity (Type 5). The building is assigned SDC=C. Which statement is correct?",opts:{"A":"Type 5 prohibits use of ELF in SDC C","B":"Type 5 requires orthogonal combination procedure per §12.5","C":"Type 5 requires Ω₀ amplification for all elements","D":"Type 5 irregularity is only relevant for SDC D and above"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-125",exp:""},
    {id:"5.141",q:"Which of the following correctly describes when the redundancy factor ρ = 1.0 can be used in SDC D for a moment frame structure?",opts:{"A":"Always — moment frames automatically qualify","B":"When the building has at least 2 bays of MF framing per story in each direction and loss of any single beam results in ≤33% story strength reduction","C":"When the building height is ≤ 65 ft","D":"ρ cannot equal 1.0 in SDC D for any structure"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-126",exp:""},
    {id:"5.142",q:"A building has SDS=1.0, Ie=1.25 (RC=III). Using ASCE 7 seismic load combinations, what is the factor applied to dead load D in the maximum compression combination?",opts:{"A":"1.20","B":"1.38","C":"1.43","D":"1.50"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-126",exp:""},
    {id:"5.143",q:"Which structures are exempt from the seismic detailing requirements per ASCE 7 in Seismic Design Category A?",opts:{"A":"No structures are exempt — all must follow Chapter 12","B":"All structures — SDC A only requires minimum lateral force (1% of weight) per §11.7","C":"Only residential buildings under 3 stories","D":"Only non-essential facilities (RC I and RC II)"},ans:"B",type:"concept",source:"AEI CH05 MCQ Pg.5-126",exp:""},
    {id:"5.144",q:"A building story has seismic story shear Vx=200k and story height hx=14ft. The calculated stability coefficient θ=0.12 > 0.10. If β=0.85 and Cd=5, what is θmax?",opts:{"A":"0.10","B":"0.12","C":"0.18","D":"0.25"},ans:"B",type:"calc",source:"AEI CH05 MCQ Pg.5-127",exp:""},
    {id:"5.145",q:"Which of the following correctly describes when the Simplified Analysis Procedure (§12.14) is NOT permitted?",opts:{"A":"Building in SDC D with 2 stories","B":"Building with a soft story vertical irregularity in SDC A","C":"Building in SDC B with 5 stories and light frame shear walls","D":"Regular 2-story bearing wall building in SDC E"},ans:"D",type:"concept",source:"AEI CH05 MCQ Pg.5-127",trap:true,exp:""},
    {id:"5.146",q:"A 3-story building uses the simplified design procedure (§12.14). W=1500k (total), SDS=0.8, light frame wood bearing walls (R=6.5). What is the seismic base shear V?",opts:{"A":"123 kips","B":"154 kips","C":"185 kips","D":"246 kips"},ans:"C",type:"calc",source:"AEI CH05 MCQ Pg.5-128",exp:""},
    {id:"5.147",q:"For the simplified procedure (§12.14) force distribution in a 3-story building: which story has the LARGEST seismic design force Fx?",opts:{"A":"1st story (ground floor)","B":"2nd story (middle)","C":"3rd story (top)","D":"All stories are equal"},ans:"C",type:"concept",source:"AEI CH05 MCQ Pg.5-128",trap:true,exp:""},
    {id:"5.148",q:"A building has fundamental period T=0.7 sec. SDS=1.0, SD1=0.5, RC=II, SRCMF (R=8, Cd=5.5, Ie=1.0). What is the design base shear Cs?",opts:{"A":"0.089","B":"0.100","C":"0.125","D":"0.150"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-128",exp:""},
    {id:"5.149",q:"A building has SDS=1.2, SD1=0.6, RC=IV (Ie=1.5). SRCMF (R=8). What is the minimum base shear Cs,min?",opts:{"A":"0.044","B":"0.056","C":"0.070","D":"0.079"},ans:"D",type:"calc",source:"AEI CH05 MCQ Pg.5-149",exp:""}]},

  ch6:{id:"ch6",label:"Chapter 6 – Diaphragms, Torsion & CM/CR (AEI Q6.1–6.70)",topic:"Diaphragms",chapters:[6],questions:[
    {id:"6.1",q:"A one-story building with rigid roof diaphragm. Walls: RA=300 k/in (N-S, x=0), RB=250 k/in (E-W, y=0), RC=200 k/in (N-S, x=90ft), RD=200 k/in (E-W, y=50ft). Seismic: wx=1000 plf (E-W direction), wy=800 plf (N-S direction). Ax=1.3. Plan is 90ft x 50ft with triangular cutout (20x20ft at SW corner). What are the x and y coordinates of the center of mass, CM?",opts:{"A":"46.80 ft and 25.85 ft","B":"46.80 ft and 24.15 ft","C":"43.20 ft and 24.15 ft","D":"43.20 ft and 25.85 ft"},ans:"B",type:"calc",source:"AEI CH06 MCQ Pg.6-45",exp:""},
    {id:"6.2",q:"Same building as Q6.1 (RA=300, RB=250, RC=200, RD=200 k/in, 90ft x 50ft rigid diaphragm). What are the x and y coordinates of the center of rigidity, CR?",opts:{"A":"50 ft and 30 ft","B":"40 ft and 30 ft","C":"40 ft and 20 ft","D":"50 ft and 20 ft"},ans:"A",type:"calc",source:"AEI CH06 MCQ Pg.6-45",exp:""},
    {id:"6.3",q:"Same building Q6.1-6.2. What is the value of the polar moment of inertia, J?",opts:{"A":"32×10⁴ (kip/in)ft²","B":"64×10⁴ (kip/in)ft²","C":"120×10⁴ (kip/in)ft²","D":"152×10⁴ (kip/in)ft²"},ans:"C",type:"calc",source:"AEI CH06 MCQ Pg.6-46",exp:""},
    {id:"6.4",q:"Same building Q6.1-6.3. Seismic in E-W direction: Vx=800plf×90ft=72k. What is the maximum shear force developed in Wall A (parallel to N-S, x=0)?",opts:{"A":"23.48 kips","B":"24.00 kips","C":"24.52 kips","D":"25.00 kips"},ans:"A",type:"calc",source:"AEI CH06 MCQ Pg.6-46",exp:""},
    {id:"6.5",q:"Same building Q6.1-6.4. What is the maximum shear force developed in Wall C (parallel to N-S, x=90ft)?",opts:{"A":"14.18 kips","B":"15.48 kips","C":"16.52 kips","D":"17.82 kips"},ans:"D",type:"calc",source:"AEI CH06 MCQ Pg.6-46",exp:""},
    {id:"6.6",q:"Same building Q6.1-6.5. What is the maximum torsional shear force developed in Wall B, due to seismic loading in the E-W direction?",opts:{"A":"0.86 kips","B":"3.03 kips","C":"4.07 kips","D":"4.37 kips"},ans:"B",type:"calc",source:"AEI CH06 MCQ Pg.6-46",exp:""},

    {id:"M789.7",q:"Single story wood frame building, 15/32 WSP diaphragm (10d nails), 3x blocked framing, Douglas-Fir. Diaphragm design force for E-W direction=650 plf. Redundancy factor rho=1.0, SDC=D, SDS=1.10. Shear wall height=15 ft. Building 120 ft x 240 ft. Which nailing requirement is most economical for the roof diaphragm boundary on the E-W wall line?",opts:{"A":"2 in.","B":"2.5 in.","C":"4 in.","D":"6 in."},ans:"C",type:"calc",source:"AEI Mini Exam Ch.7-8-9 Pg.8 (Spring 2025)",exp:""},

    {id:"M789.10",q:"Light frame wood wall supporting flexible roof diaphragm. Roof DL ignored. Wall self-weight=15 psf. Wall shear force at SD level Vw=6000 lbs. ASD design. Number of sill bolts required, given: allowable capacity=1200 lbs/bolt, redundancy rho=1.0, Cs=0.25, wall=22 ft wide, 16 ft tall, max spacing=6 ft, end distance=1 ft minimum, min 2 bolts.",opts:{"A":"3 sill bolts","B":"4 sill bolts","C":"5 sill bolts","D":"6 sill bolts"},ans:"C",type:"calc",source:"AEI Mini Exam Ch.7-8-9 Pg.11 (Spring 2025)",exp:""},
    {id:"M789.11",q:"Electrical generator (high deformability materials) located on roof of building. Operating weight=1000 lbs. Building height=200 ft. Ss=1.5g, S1=0.6g. Site Class C. Risk Category II. Determine the seismic design force for the generator.",opts:{"A":"300 lbs","B":"480 lbs","C":"576 lbs","D":"1600 lbs"},ans:"C",type:"calc",source:"AEI Mini Exam Ch.7-8-9 Pg.12 (Spring 2025)",exp:""},

    {id:"M789.13",q:"Advertising billboard at bottom floor of 5-story building. Weight=500 lbs, Ss=0.88, S1=0.39. Site Class D (based on measured soil). Risk Category II. Determine seismic design force for the billboard.",opts:{"A":"100 lbs","B":"112 lbs","C":"500 lbs","D":"536 lbs"},ans:"B",type:"calc",source:"AEI Mini Exam Ch.7-8-9 Pg.14 (Spring 2025)",exp:""},
    {id:"M789.14",q:"Which of the following discrete mechanical components positively attached to a 4-story structure is EXEMPT from seismic design requirements of ASCE 7 Chapter 13? SDC=D, Ip=1.0.",opts:{"A":"rigidly connected with associated ductwork. Weight=15 lbs, CM at 5 ft above adjacent floor","B":"rigidly connected with associated piping and conduit. Weight=25 lbs, CM at 4 ft above adjacent floor","C":"rigidly connected with associated ductwork. Weight=300 lbs, CM at 3 ft above adjacent floor","D":"flexibly connected with associated piping and conduit. Weight=400 lbs, CM at 5 ft above adjacent floor"},ans:"A",type:"code",source:"AEI Mini Exam Ch.7-8-9 Pg.15 (Spring 2025)",trap:true,exp:""},
    {id:"M789.15",q:"Single story residential building. 7/16-in WSP sheathing with 8d galvanized box nails applied directly to framing members at 3-in spacing OC at panel edges. What is the maximum allowable shear for seismic forces for the wood structural panel shear wall?",opts:{"A":"450 plf","B":"490 plf","C":"505 plf","D":"550 plf"},ans:"A",type:"calc",source:"AEI Mini Exam Ch.7-8-9 Pg.16 (Spring 2025)",exp:""},
    {id:"M789.16",q:"The diaphragm design force Fpx used for the design of collectors and their connections to diaphragms and to the vertical elements of the SFRS shall be increased by 25% for certain structures. Which structure requires the 25% increase?",opts:{"A":"Building assigned to SDC=C. Regular building","B":"Building assigned to SDC=D. Irregular building with non-parallel systems","C":"Building assigned to SDC=C. Irregular building with reentrant corner","D":"Building assigned to SDC=C. Irregular building with in-plane offset (vertical Type 4)"},ans:"D",type:"code",source:"AEI Mini Exam Ch.7-8-9 Pg.17 (Spring 2025)",trap:true,exp:""},
    {id:"M789.17",q:"Light frame shear wall, UNBLOCKED, 3/8-in sheathing, 6d common nails, 6-in edge nail spacing, 12-in intermediate nail spacing, studs spaced 16 in OC, wall 16 ft x 12 ft. Determine the service level shear capacity when subjected to seismic loads (ASD).",opts:{"A":"1680 lbs","B":"280 plf","C":"400 plf","D":"1920 lbs"},ans:"D",type:"calc",source:"AEI Mini Exam Ch.7-8-9 Pg.18 (Spring 2025)",exp:""1.1":"Divergent plates → mid-ocean <b>ridge</b>. Trench = subduction (convergent). Exam trap: 'blind fault' ≠ divergent plate boundary.","1.2":"<b>Normal fault</b>: hanging wall drops relative to foot wall (gravity/extension). Reverse = hanging wall rises. Exam trap: 'normal' sounds ordinary but means extensional gravity-driven fault.","1.3":"<b>Epicenter</b> = point on surface directly above the focus/hypocenter. Focus = actual rupture point underground. Exam trap: epicenter ≠ focus.","1.4":"<b>Subduction</b> = convergent boundary where one plate descends beneath another → forms oceanic trenches.","1.5":"San Andreas = <b>right-lateral</b> strike-slip. Standing on one side, opposite block moves RIGHT. Exam trap: many confuse with left-lateral.","1.6":"C is wrong: S-waves displace material <b>perpendicular</b> to travel direction. Option C describes P-wave behavior. Exam trap: P-waves (primary) displace ahead/behind; S-waves (secondary) displace sideways.","1.7":"Approaching shore: friction with seafloor → velocity ↓; energy conservation in shallower water → height ↑. Exam trap: velocity and height change in OPPOSITE directions.","1.8":"C is WRONG: S-waves cause <b>MORE</b> damage (shear/rocking motion). P-waves arrive first but cause less structural damage. Exam trap: 'P' for Primary/first; 'S' for Secondary but more destructive.","1.9":"Tsunami = seismic <b>sea (water) wave</b>. Generated by vertical seafloor displacement. 'Harbor wave' in Japanese, but technically = seismic water wave.","1.10":"<b>All of the above</b>: tectonic (rock snap), volcanic, and man-made explosions all generate earthquakes.","1.11":"P-waves (Primary/Compression): compress/dilate material <b>in the direction</b> of wave travel — push and pull ahead and behind. They travel FASTEST (first to arrive).","1.12":"Right lateral normal fault: hanging wall moves <b>down-right</b>. In AEI diagram, sketch B = right-lateral + normal (hanging wall down). Exam trap: must identify BOTH components (lateral + dip).","1.13":"<b>Reverse fault</b>: foot wall moves DOWN (same as hanging wall moving UP). Compressional forces. Thrust fault = reverse with shallow dip (<45°). Exam trap: foot wall moving down = reverse (counterintuitive).","1.14":"<b>Focal depth</b> = vertical distance from epicenter (surface point) down to the focus (hypocenter). Shallow focus (<70 km) → more damage.","1.15":"<b>Fault creep</b> = slow, continuous aseismic movement along a fault without significant earthquakes. Common on parts of Hayward and Calaveras faults.","2.1":"<b>Probability of exceedance</b> defines hazard level (likelihood of exceeding a given ground motion in a time period). Richter/MM measure a specific event. IBC: 2% in 50 yr for MCEᴿ.","2.2":"Richter magnitude = <b>logarithm of peak amplitude</b> on seismograph. Roman numerals (I–XII) = Modified Mercalli INTENSITY (not magnitude). Exam trap: MM = intensity; Richter = magnitude.","2.3":"MM scale = earthquake <b>intensity</b> (effects felt at a location, I–XII). Richter = magnitude (energy at source). Exam trap: these two are frequently confused.","2.4":"MM scale has <b>12 levels</b> (I–XII): I = imperceptible → XII = total destruction. Richter has no upper limit.","2.5":"<b>Attenuation</b> = decrease of seismic energy/amplitude with increasing distance from epicenter (geometric spreading + material damping).","2.6":"Seismometer measures <b>displacement amplitude</b> of ground motion over time. Richter magnitude is COMPUTED from the recorded amplitude.","2.7":"<b>Magnitude</b> does not influence the RATE of attenuation — it sets the starting amplitude. Attenuation rate depends on distance, path, and site conditions. Exam trap: magnitude affects how much you start with, not how fast it decreases.","2.8":"Richter amplitude: each unit = 10×. Two units = 10² = <b>100× amplitude</b>. Energy: each unit = 31.6×; two units ≈ 1000×. Exam trap: Q2.8 = amplitude (100×) vs Q2.9 = energy (1000×). Classic paired trap.","2.9":"Energy: each Richter unit ≈ 31.6×. Two units = 31.6² ≈ <b>1000× energy</b>. Exam trap: paired with Q2.8. Amplitude = 100×; Energy = 1000×.","2.10":"Richter Scale = logarithmic scale for earthquake <b>strength (magnitude)</b> based on max seismograph amplitude. Option D describes Moment Magnitude (Mw).","2.11":"<b>Attenuation</b> = wave propagation phenomenon, NOT a geotechnical hazard. Geotechnical hazards: liquefaction, lateral spreading, landslides, settlement. Exam trap: attenuation describes wave behavior, not site failure.","2.12":"Northridge 1994: brittle fracture of <b>welded steel moment frame connections</b> → post-Northridge connection standards. Mexico City 1985 = soft soil resonance; Kobe 1995 = liquefaction.","2.13":"<b>Soft clay</b> (bay mud, Site Class E/F) = maximum amplification. Classic example: Mexico City 1985 — soft lake clay amplified motions 5–10× relative to hard rock. Low shear wave velocity → high impedance contrast.","2.14":"<b>Field Act (1933)</b> = DSA (Division of State Architecture) approves school design. Riley Act (1933) = minimum lateral force standards for ALL buildings. Exam trap: both passed in 1933 after Long Beach EQ — different scope.","2.15":"<b>MM Scale IX</b> = 'Considerable damage in specially designed structures.' VIII = partial collapse of ordinary buildings. X = most masonry/frame destroyed.","2.16":"<b>All three</b> contribute to resonance: EQ period = site period, site period = building period, building period = EQ period. Maximum resonance when all three coincide. Classic exam trap — all of the above.","2.17":"Pₑ = 1-(1-1/Tᵣ)ⁿ
