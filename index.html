<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSP Seismic Exam Prep</title>
<style>
:root{
  --bg:#f5f3ef;--surf:#fff;--surf2:#f0ede8;--bdr:#d8d3cc;
  --pri:#1a4f8a;--pri-lt:#e8f0f8;--pri-dk:#133b6a;
  --ok:#1e6b38;--ok-lt:#e8f5ee;--err:#b52020;--err-lt:#faeaea;
  --wrn:#8a5a00;--wrn-lt:#fff4de;--txt:#1a1714;--txt2:#3d3832;--txt3:#7a736a;
  --r:7px;--sh:0 2px 6px rgba(0,0,0,.07)
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.55;min-height:100vh;-webkit-text-size-adjust:100%}
.app{max-width:900px;margin:0 auto;padding:12px 12px 60px}

/* HEADER */
header{background:var(--pri);color:#fff;padding:12px 16px;border-radius:var(--r);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
header h1{font-size:1.05rem;font-weight:700}
.hsub{font-size:.72rem;opacity:.8;margin-top:1px}

/* NAV TABS */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:6px 13px;border:2px solid var(--bdr);background:var(--surf);color:var(--txt2);border-radius:20px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .15s;white-space:nowrap}
.tab.on,.tab:hover{background:var(--pri);color:#fff;border-color:var(--pri)}
.screen{display:none}.screen.on{display:block}

/* CARD */
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh)}
.chdr{font-size:.9rem;font-weight:700;color:var(--pri);margin-bottom:10px;padding-bottom:7px;border-bottom:2px solid var(--pri-lt)}

/* FILTERS */
.frow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.flbl{font-size:.7rem;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.ftag{padding:4px 10px;border:1.5px solid var(--bdr);background:var(--surf2);color:var(--txt2);border-radius:4px;cursor:pointer;font-size:.78rem;font-weight:500;transition:all .12s;white-space:nowrap}
.ftag.on{background:var(--pri);color:#fff;border-color:var(--pri);font-weight:700}
.ftag:hover:not(.on){border-color:var(--pri);color:var(--pri)}

/* DOMAIN COLORS */
.dI{background:#e8f0ff;color:#1a3a8a}.dII{background:#fff0e8;color:#8a3a00}
.dIII{background:#e8f8e8;color:#1a6a1a}.dIV{background:#f8e8f8;color:#6a1a6a}
.dV{background:#e8f8f8;color:#1a6a6a}.dVI{background:#f8f0e0;color:#6a4a00}
.dVII{background:#f0e8f8;color:#4a1a7a}

/* SET GRID */
.sgrp{margin-bottom:16px}
.sgrp-hdr{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);margin-bottom:7px;padding:3px 7px;background:var(--surf2);border-radius:4px;display:inline-block}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:7px}
.scard{background:var(--surf);border:2px solid var(--bdr);border-radius:var(--r);padding:11px;cursor:pointer;transition:all .15s}
.scard:hover{border-color:var(--pri);background:var(--pri-lt);transform:translateY(-1px)}
.scard.done{border-color:var(--ok)}
.sc-ttl{font-weight:700;font-size:.83rem;color:var(--txt);margin-bottom:2px;line-height:1.3}
.sc-meta{font-size:.7rem;color:var(--txt3);margin-bottom:3px}
.sc-dom{font-size:.65rem;font-weight:700;padding:1px 5px;border-radius:3px;display:inline-block;margin-bottom:3px}
.sc-badge{font-size:.7rem;font-weight:600;padding:2px 6px;border-radius:8px;background:var(--pri-lt);color:var(--pri);display:inline-block}
.scard.done .sc-badge{background:var(--ok-lt);color:var(--ok)}
.sc-pips{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.pip{font-size:.62rem;padding:1px 4px;border-radius:3px;font-weight:600}
.pip-c{background:#fff3e0;color:#b54000}.pip-k{background:#e3f2fd;color:#1a4f8a}.pip-d{background:#f3e5f5;color:#5a1090}

/* QUIZ */
.qhdr{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;box-shadow:var(--sh)}
.qtitle{font-weight:700;color:var(--pri);font-size:.88rem}
.qmeta2{font-size:.72rem;color:var(--txt3)}
.pbar{height:4px;background:var(--bdr);border-radius:2px;overflow:hidden;margin-bottom:2px;width:140px}
.pfill{height:100%;background:var(--pri);border-radius:2px;transition:width .3s}
.ptxt{font-size:.68rem;color:var(--txt3);text-align:right}
.tbar{height:3px;background:var(--bdr);border-radius:2px;margin-bottom:12px;overflow:hidden}
.tfill{height:100%;background:var(--ok);border-radius:2px;transition:width .1s linear}
.tfill.w{background:var(--wrn)}.tfill.d{background:var(--err)}

/* QUESTION STATUS DOTS */
.qdots{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px;padding:8px 10px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r)}
.qdot{width:14px;height:14px;border-radius:50%;border:2px solid var(--bdr);background:var(--surf2);cursor:pointer;flex-shrink:0;transition:all .1s}
.qdot.current{border-color:var(--pri);background:var(--pri-lt)}
.qdot.correct{background:var(--ok);border-color:var(--ok)}
.qdot.wrong{background:var(--err);border-color:var(--err)}
.qdot.skipped{background:var(--wrn-lt);border-color:var(--wrn)}

/* QUESTION CARD */
.qcard{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;box-shadow:var(--sh);margin-bottom:12px}
.qmeta3{font-size:.7rem;color:var(--txt3);margin-bottom:7px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.qtag{padding:2px 6px;border-radius:3px;font-size:.68rem;font-weight:700}
.tag-c{background:#fff3e0;color:#b54000}.tag-k{background:#e3f2fd;color:#1a4f8a}
.tag-d{background:#f3e5f5;color:#5a1090}.tag-trap{background:#fff3cd;color:#7a5200}
.qsrc{font-size:.65rem;color:var(--txt3);font-style:italic;margin-left:auto}
.qtxt{font-size:.96rem;font-weight:500;color:var(--txt);line-height:1.65;margin-bottom:16px}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;border:2px solid var(--bdr);border-radius:var(--r);cursor:pointer;transition:all .12s;background:var(--surf2)}
.opt:hover:not(.locked){border-color:var(--pri);background:var(--pri-lt)}
.opt.correct{border-color:var(--ok)!important;background:var(--ok-lt)!important}
.opt.wrong{border-color:var(--err)!important;background:var(--err-lt)!important}
.opt.locked{cursor:default}
.olbl{font-weight:800;color:var(--pri);min-width:18px;font-size:.83rem;flex-shrink:0}
.opt.correct .olbl{color:var(--ok)}.opt.wrong .olbl{color:var(--err)}
.otxt{font-size:.88rem;color:var(--txt2);line-height:1.45}

/* EXPLANATION */
.expbox{border-radius:var(--r);padding:12px 14px;margin-top:12px;display:none}
.expbox.on{display:block}
.expbox.ok{background:var(--ok-lt);border:1px solid #a8d8b8}
.expbox.bad{background:#fff8f8;border:1px solid #f0c0c0}
.exphdr{font-weight:800;font-size:.8rem;margin-bottom:5px}
.expbody{font-size:.85rem;line-height:1.65;color:var(--txt2)}
.expbody b{color:var(--txt)}
.expsrc{font-size:.68rem;color:var(--txt3);margin-top:7px;border-top:1px solid var(--bdr);padding-top:4px;font-style:italic}

/* NAVIGATION BUTTONS */
.nav-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border:none;border-radius:var(--r);cursor:pointer;font-size:.84rem;font-weight:700;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--pri);color:#fff}.btn-p:hover{background:var(--pri-dk)}
.btn-ok{background:var(--ok);color:#fff}
.btn-out{background:transparent;color:var(--pri);border:2px solid var(--pri)}.btn-out:hover{background:var(--pri-lt)}
.btn-ghost{background:var(--surf2);color:var(--txt2);border:1.5px solid var(--bdr)}.btn-ghost:hover{border-color:var(--pri);color:var(--pri)}
.btn-sm{padding:5px 11px;font-size:.77rem}
.btn-danger{background:var(--err);color:#fff}
.spacer{flex:1}

/* RESULTS */
.rhero{background:linear-gradient(135deg,var(--pri),var(--pri-dk));color:#fff;border-radius:var(--r);padding:24px;text-align:center;margin-bottom:14px}
.rpct{font-size:3.2rem;font-weight:800;line-height:1}
.rlbl{font-size:.95rem;opacity:.85;margin-top:3px}
.rgrade{font-size:1.3rem;font-weight:800;margin-top:7px}
.sgrid2{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px;text-align:center}
.statv{font-size:1.4rem;font-weight:800;color:var(--pri)}.statl{font-size:.68rem;color:var(--txt3);margin-top:1px}
.ritem{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:11px;margin-bottom:7px}
.ritem.wr{border-left:4px solid var(--err)}.ritem.ok{border-left:4px solid var(--ok)}.ritem.sk{border-left:4px solid var(--wrn)}
.rq{font-size:.85rem;margin-bottom:4px}.ra{font-size:.76rem}
.aok{color:var(--ok);font-weight:700}.abad{color:var(--err);font-weight:700}

/* TRACKER */
.trow{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px;margin-bottom:7px}
.trow-l{font-size:.83rem;font-weight:600;margin-bottom:5px}
.sbar-w{background:var(--bdr);height:6px;border-radius:3px;overflow:hidden;margin-bottom:3px}
.sbar{height:100%;border-radius:3px;transition:width .5s}
.sb-ok{background:var(--ok)}.sb-mid{background:var(--wrn)}.sb-lo{background:var(--err)}
.trow-m{font-size:.7rem;color:var(--txt3)}

/* FLASHCARD */
.fcwrap{perspective:1000px;margin:14px auto;max-width:540px;cursor:pointer}
.fc{width:100%;position:relative;transform-style:preserve-3d;transition:transform .4s ease;min-height:380px}
.fc.flip{transform:rotateY(180deg)}
.fcface{position:absolute;width:100%;backface-visibility:hidden;border-radius:var(--r);padding:16px 18px;display:flex;flex-direction:column;justify-content:flex-start;border:2px solid var(--bdr);box-shadow:var(--sh);overflow-y:auto;max-height:420px}
.fcfront{background:linear-gradient(135deg,var(--pri-lt),var(--surf))}
.fcback{background:linear-gradient(135deg,var(--ok-lt),var(--surf));transform:rotateY(180deg)}
.fclbl{font-size:.66rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);margin-bottom:9px}
.fctxt{font-size:.88rem;font-weight:400;color:var(--txt);line-height:1.6;text-align:left;overflow-y:auto}
.fchint{font-size:.7rem;color:var(--txt3);text-align:center;margin-top:auto;padding-top:10px;flex-shrink:0}
.fcctrls{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}

/* CHEATSHEET */
.cssec{margin-bottom:20px}
.cssec h3{font-size:.88rem;font-weight:800;color:var(--pri);border-bottom:2px solid var(--pri-lt);padding-bottom:5px;margin-bottom:10px}
.fbox{background:var(--surf2);border:1px solid var(--bdr);border-left:4px solid var(--pri);border-radius:5px;padding:9px 13px;margin-bottom:5px;font-size:.84rem}
.fbox .f{font-family:Menlo,monospace;font-size:.88rem;color:var(--pri-dk);font-weight:700;margin-bottom:2px}
.fbox .n{font-size:.76rem;color:var(--txt2)}
.tbox{background:var(--wrn-lt);border-left:4px solid var(--wrn);border-radius:5px;padding:7px 11px;margin-bottom:5px;font-size:.8rem;color:#5a3800}
.tsm{width:100%;border-collapse:collapse;font-size:.76rem;margin-bottom:8px}
.tsm th{background:var(--pri);color:#fff;padding:5px 8px;text-align:left}
.tsm td{padding:4px 8px;border-bottom:1px solid var(--bdr)}
.tsm tr:nth-child(even){background:var(--surf2)}

@media(max-width:540px){
  .sgrid{grid-template-columns:1fr 1fr}
  .qtxt{font-size:.9rem}
  .rpct{font-size:2.6rem}
  .qdot{width:12px;height:12px}
}
@media print{
  .tabs,.frow,.nav-row,.tbar,.qdots{display:none!important}
  .screen{display:block!important}
  .qcard{page-break-inside:avoid;box-shadow:none}
  .expbox.on{display:block!important}
}
</style>
</head>
<body>
<div class="app">

<header>
  <div>
    <h1>CSP Seismic Exam Prep</h1>
    <div class="hsub" id="hSub">Loading…</div>
  </div>
  <span id="hTimer"></span>
</header>

<div class="tabs" id="mainTabs">
  <button class="tab on" onclick="nav('home')">📚 Quiz Sets</button>
  <button class="tab" id="tQuiz" onclick="nav('quiz')" style="display:none">📝 Quiz</button>
  <button class="tab" id="tRes" onclick="nav('results')" style="display:none">📊 Results</button>
  <button class="tab" onclick="nav('flashcards')">🃏 Flashcards</button>
  <button class="tab" onclick="nav('tracker')">📈 Progress</button>
  <button class="tab" onclick="nav('cheatsheet')">📋 Cheatsheet</button>
</div>

<!-- HOME -->
<div class="screen on" id="home">
  <div class="card">
    <div class="chdr">📚 Select a Quiz Set</div>
    <div class="frow" id="frow">
      <span class="flbl">Type:</span>
      <button class="ftag on" data-tf="all"    onclick="setTF(this)">All</button>
      <button class="ftag"    data-tf="calc"   onclick="setTF(this)">⚙ Calc Only</button>
      <button class="ftag"    data-tf="concept" onclick="setTF(this)">◈ Concept</button>
      <span style="width:10px"></span>
      <span class="flbl">CSP Area:</span>
      <button class="ftag on" data-df="all" onclick="setDF(this)">All</button>
      <button class="ftag dI" data-df="I"   onclick="setDF(this)">I</button>
      <button class="ftag dII" data-df="II"  onclick="setDF(this)">II</button>
      <button class="ftag dIII" data-df="III" onclick="setDF(this)">III</button>
      <button class="ftag dIV" data-df="IV"  onclick="setDF(this)">IV</button>
      <button class="ftag dV" data-df="V"   onclick="setDF(this)">V</button>
      <button class="ftag dVI" data-df="VI"  onclick="setDF(this)">VI</button>
      <button class="ftag dVII" data-df="VII" onclick="setDF(this)">VII</button>
    </div>
    <div id="setList"></div>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <div class="qhdr">
    <div>
      <div class="qtitle" id="qTitle">Quiz</div>
      <div class="qmeta2" id="qMeta">–</div>
    </div>
    <div>
      <div class="pbar"><div class="pfill" id="pFill"></div></div>
      <div class="ptxt" id="pTxt"></div>
    </div>
  </div>
  <div class="tbar"><div class="tfill" id="tFill"></div></div>
  <!-- Question status dots -->
  <div class="qdots" id="qdots"></div>
  <!-- Question card -->
  <div class="qcard" id="qcard">
    <div class="qmeta3" id="qMeta3"></div>
    <div class="qtxt" id="qTxt"></div>
    <div class="opts" id="qOpts"></div>
    <div class="expbox" id="qExp"></div>
  </div>
  <!-- Navigation -->
  <div class="nav-row">
    <button class="btn btn-ghost btn-sm" id="btnPrev" onclick="goPrev()">← Prev</button>
    <button class="btn btn-ghost btn-sm" id="btnSkip" onclick="goSkip()">Skip →</button>
    <div class="spacer"></div>
    <button class="btn btn-p btn-sm" id="btnNext" onclick="goNext()" style="display:none">Next →</button>
    <button class="btn btn-sm" style="background:var(--err-lt);color:var(--err);border:1.5px solid var(--err)" onclick="endQuiz()">End Quiz</button>
  </div>
</div>

<!-- RESULTS -->
<div class="screen" id="results">
  <div class="rhero">
    <div class="rpct" id="rPct">--%</div>
    <div class="rlbl" id="rLbl">–</div>
    <div class="rgrade" id="rGrade"></div>
  </div>
  <div class="sgrid2" id="rStats"></div>
  <div class="card"><div class="chdr">Review Answers</div><div id="rReview"></div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
    <button class="btn btn-p btn-sm" onclick="retakeWrong()">↺ Retake Wrong</button>
    <button class="btn btn-out btn-sm" onclick="nav('home')">← Quiz Sets</button>
    <button class="btn btn-ghost btn-sm" onclick="exportData()">↓ Export Progress</button>
    <label class="btn btn-ghost btn-sm" style="cursor:pointer">↑ Import<input type="file" accept=".json" id="impFile" style="display:none" onchange="importData(event)"></label>
  </div>
</div>

<!-- FLASHCARDS -->
<div class="screen" id="flashcards">
  <div class="card">
    <div class="chdr">🃏 Flashcard Mode</div>
    <div class="frow">
      <select id="fcType" onchange="loadFC()" style="padding:5px;border-radius:5px;border:1px solid var(--bdr);font-size:.83rem">
        <option value="all">All Types</option>
        <option value="calc">Calculation</option>
        <option value="concept">Concept</option>
        <option value="trap">Exam Traps</option>
      </select>
      <select id="fcCh" onchange="loadFC()" style="padding:5px;border-radius:5px;border:1px solid var(--bdr);font-size:.83rem">
        <option value="all">All Chapters</option>
      </select>
    </div>
    <div class="fcwrap" onclick="fcFlip()">
      <div class="fc" id="fcCard">
        <div class="fcface fcfront">
          <div class="fclbl">Q <span id="fcN">1</span> / <span id="fcT">–</span></div>
          <div class="fctxt" id="fcQ">Loading…</div>
          <div class="fchint">Tap to reveal answer</div>
        </div>
        <div class="fcface fcback">
          <div class="fclbl">Answer</div>
          <div class="fctxt" id="fcA" style="font-size:.82rem;text-align:left"></div>
        </div>
      </div>
    </div>
    <div style="text-align:center;font-size:.78rem;color:var(--txt3);margin-top:7px" id="fcProg"></div>
    <div class="fcctrls">
      <button class="btn btn-sm btn-out" onclick="fcPrev()">← Prev</button>
      <button class="btn btn-sm btn-p"  onclick="fcFlip()">Flip</button>
      <button class="btn btn-sm btn-out" onclick="fcNext()">Next →</button>
      <button class="btn btn-sm" style="background:var(--ok-lt);color:var(--ok);border:1px solid #a8d8b8" onclick="fcKnow()">✓ Know</button>
      <button class="btn btn-sm" style="background:var(--err-lt);color:var(--err);border:1px solid #f0c0c0" onclick="fcStudy()">✗ Review</button>
    </div>
    <div style="text-align:center;font-size:.73rem;color:var(--txt3);margin-top:9px" id="fcKnown"></div>
  </div>
</div>

<!-- TRACKER -->
<div class="screen" id="tracker">
  <div class="card"><div class="chdr">📈 Performance by Chapter</div><div id="trackerContent"></div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
    <button class="btn btn-sm btn-danger" onclick="clearAll()">🗑 Clear All Data</button>
    <button class="btn btn-sm btn-out" onclick="exportData()">↓ Export Progress</button>
    <label class="btn btn-sm btn-out" style="cursor:pointer">↑ Import<input type="file" accept=".json" id="impFile2" style="display:none" onchange="importData(event)"></label>
  </div>
</div>

<!-- CHEATSHEET -->
<div class="screen" id="cheatsheet">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;flex-wrap:wrap;gap:7px">
      <div class="chdr" style="margin:0;border:none;padding:0">📋 Exam Cheatsheet</div>
      <button class="btn btn-sm btn-out" onclick="window.print()">🖨 Print</button>
    </div>
    <div id="csContent"></div>
  </div>
</div>

</div><!-- .app -->


<script>


// ── Storage (with in-memory fallback for Safari file://) ──────────────
const _mem={};
function _lsOk(){try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return true;}catch{return false;}}
const LS={
  get(k){try{return _lsOk()?JSON.parse(localStorage.getItem(k)):JSON.parse(_mem[k]||'null');}catch{return null;}},
  set(k,v){try{const s=JSON.stringify(v);_lsOk()?localStorage.setItem(k,s):(_mem[k]=s);}catch{}},
  del(k){try{_lsOk()?localStorage.removeItem(k):delete _mem[k];}catch{}}
};

// ── Domain map ────────────────────────────────────────────────────────
const DOM={
  ch1:{a:'I',n:'Seismology & Ground Motion',w:'9–15%'},
  ch2:{a:'I',n:'Seismology & Ground Motion',w:'9–15%'},
  ch3:{a:'II',n:'Structural Dynamics',w:'10–16%'},
  ch4:{a:'II',n:'Code Provisions & SDC',w:'10–16%'},
  ch5:{a:'II',n:'Seismic Design & ELF',w:'10–16%'},

// ── App state ─────────────────────────────────────────────────────────
let SETS=[], ALL=[];
let TF='all', DF='all';  // type filter, domain filter
let A={ // active quiz
  set:null, qs:[], idx:0,
  ans:{},   // idx -> {choice, isOk, skipped}
  ti:null   // timer interval
};
let fcDeck=[], fcIdx=0, fcKnown=new Set(), fcToReview=new Set();

// ── Init (polls until data ready) ─────────────────────────────────────
function init(){
  if(!window.QUIZ_DATA){setTimeout(init,50);return;}
  // Build quiz sets
  SETS=[]; ALL=[];
  Object.values(window.QUIZ_DATA).forEach(sec=>{
    const qs=sec.questions; ALL.push(...qs);
    const n=Math.ceil(qs.length/50);
    for(let i=0;i<n;i++){
      const chunk=qs.slice(i*50,(i+1)*50);
      let lbl;
      if(n===1){lbl=sec.label;}
      else{
        const hasME=chunk.some(q=>String(q.id).startsWith('ME'));
        const hasPSW=chunk.some(q=>String(q.id).startsWith('PSW'));
        const src=hasME&&hasPSW?'AEI+Mini+PSW':hasME?'AEI+Mini':hasPSW?'AEI+PSW':'AEI MCQ';
        lbl=sec.label.split('(')[0].trim()+' – Pt '+(i+1)+' ['+src+']';
      }
      SETS.push({id:sec.id+'_'+(i+1),label:lbl,sid:sec.id,topic:sec.topic||sec.label,chs:sec.chapters||[],qs:chunk});
    }
  });
  renderHome();
  buildFcFilter();
  updateHeader();
}

// ── Navigation ────────────────────────────────────────────────────────
function nav(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  const tabMap={home:0,quiz:1,results:2,flashcards:3,tracker:4,cheatsheet:5};
  const tabs=document.querySelectorAll('.tab');
  if(tabMap[id]!==undefined) tabs[tabMap[id]]?.classList.add('on');
  if(id==='tracker') renderTracker();
  if(id==='cheatsheet') renderCS();
}

// ── Filters ───────────────────────────────────────────────────────────
function setTF(btn){
  document.querySelectorAll('[data-tf]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); TF=btn.dataset.tf; renderHome();
}
function setDF(btn){
  document.querySelectorAll('[data-df]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); DF=btn.dataset.df; renderHome();
}

// ── Home ──────────────────────────────────────────────────────────────
function renderHome(){
  const scores=LS.get('csp_v2')||{};
  const groups={}, order=[];
  SETS.forEach(set=>{
    const d=DOM[set.sid]||{a:'?',n:set.topic};
    if(DF!=='all'&&!d.a.includes(DF)) return;
    let qs=set.qs;
    if(TF==='calc') qs=qs.filter(q=>q.type==='calc');
    else if(TF==='concept') qs=qs.filter(q=>q.type!=='calc');
    if(!qs.length) return;
    const gk=`CSP Area ${d.a} – ${d.n}${d.w?' ('+d.w+')':''}`;
    if(!groups[gk]){groups[gk]=[];order.push(gk);}
    groups[gk].push({set,d,qs});
  });
  let html='';
  order.forEach(gk=>{
    html+=`<div class="sgrp"><div class="sgrp-hdr">${gk}</div><div class="sgrid">`;
    groups[gk].forEach(({set,d,qs})=>{
      const best=getBest(set.id,scores), has=best!==null;
      const pc=best>=80?'var(--ok)':best>=60?'var(--wrn)':'var(--err)';
      const nc=set.qs.filter(q=>q.type==='calc').length;
      const nk=set.qs.filter(q=>q.type==='concept').length;
      const nd=set.qs.filter(q=>q.type==='code').length;
      html+=`<div class="scard ${has?'done':''}" onclick="startQuiz('${set.id}')">
        <div class="sc-ttl">${set.label}</div>
        <div class="sc-meta">${qs.length} Q${qs.length!==1?'s':''}</div>
        <div class="sc-dom d${d.a.replace('-','')}" style="background:inherit">Area ${d.a}</div>
        <div class="sc-badge">${has?`<span style="color:${pc}">${best}%</span> best`:'Not started'}</div>
        <div class="sc-pips">
          ${nc?`<span class="pip pip-c">⚙${nc}</span>`:''}
          ${nk?`<span class="pip pip-k">◈${nk}</span>`:''}
          ${nd?`<span class="pip pip-d">📋${nd}</span>`:''}
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('setList').innerHTML=html||'<p style="color:var(--txt3);padding:16px;text-align:center">No sets match filters.</p>';
}

function getBest(id,scores){const s=scores[id];return s?.length?Math.max(...s.map(x=>x.p)):null;}
function saveScore(id,p,ok,n){
  const scores=LS.get('csp_v2')||{};
  if(!scores[id])scores[id]=[];
  scores[id].unshift({p,ok,n,d:new Date().toLocaleDateString()});
  if(scores[id].length>5)scores[id]=scores[id].slice(0,5);
  LS.set('csp_v2',scores);
}

// ── Quiz Engine ───────────────────────────────────────────────────────
function startQuiz(setId){
  const set=SETS.find(s=>s.id===setId); if(!set)return;
  let qs=[...set.qs];
  if(TF==='calc') qs=qs.filter(q=>q.type==='calc');
  else if(TF==='concept') qs=qs.filter(q=>q.type!=='calc');
  if(!qs.length){alert('No questions match the current type filter for this set.');return;}
  A={set,qs,idx:0,ans:{},ti:null};
  document.getElementById('tQuiz').style.display='';
  nav('quiz');
  renderQ();
}

function renderQ(){
  const q=A.qs[A.idx];
  if(!q){endQuiz();return;}
  const n=A.qs.length;
  const answered=A.ans[A.idx]!==undefined;

  // Progress
  document.getElementById('pFill').style.width=`${A.idx/n*100}%`;
  document.getElementById('pTxt').textContent=`${A.idx+1} / ${n}`;
  document.getElementById('qTitle').textContent=A.set.label;
  document.getElementById('qMeta').textContent=`${DOM[A.set.sid]?.n||''} · Q${A.idx+1} of ${n}`;

  // Status dots
  let dots='';
  A.qs.forEach((_,i)=>{
    const a=A.ans[i];
    const cls=i===A.idx?'current':!a?'':a.skipped?'skipped':a.isOk?'correct':'wrong';
    dots+=`<div class="qdot ${cls}" onclick="jumpTo(${i})" title="Q${i+1}"></div>`;
  });
  document.getElementById('qdots').innerHTML=dots;

  // Question meta
  const tl={calc:'⚙ Calculation',concept:'◈ Concept',code:'📋 Code'}[q.type]||'Concept';
  const tc={calc:'tag-c',concept:'tag-k',code:'tag-d'}[q.type]||'tag-k';
  document.getElementById('qMeta3').innerHTML=
    `<span class="qtag ${tc}">${tl}</span>`+
    (q.trap?'<span class="qtag tag-trap">⚠ Exam Trap</span>':'')+
    `<span class="qsrc">${q.source||''}</span>`;

  document.getElementById('qTxt').textContent=q.q;

  // Options
  const isLocked=answered;
  const a=A.ans[A.idx];
  let optsHtml='';
  Object.entries(q.opts).forEach(([k,v])=>{
    let cls=isLocked?'locked':'';
    if(isLocked){
      if(k===q.ans) cls+=' correct';
      else if(a&&!a.skipped&&k===a.choice) cls+=' wrong';
    }
    optsHtml+=`<div class="opt ${cls}" ${!isLocked?`onclick="selectAns('${k}')"`:''}>`+
      `<div class="olbl">${k}</div><div class="otxt">${v}</div></div>`;
  });
  document.getElementById('qOpts').innerHTML=optsHtml;

  // Explanation
  const expBox=document.getElementById('qExp');
  if(answered&&!a.skipped){
    const expTxt=(window.QUIZ_EXP&&window.QUIZ_EXP[q.id])||q.exp||'';
    expBox.className=`expbox on ${a.isOk?'ok':'bad'}`;
    expBox.innerHTML=`<div class="exphdr">${a.isOk?'✓ Correct':'✗ Incorrect — Correct answer: '+q.ans}</div>`+
      `<div class="expbody">${expTxt}</div>`+
      `<div class="expsrc">Source: ${q.source||'—'}</div>`;
  } else {
    expBox.className='expbox';expBox.innerHTML='';
  }

  // Nav buttons
  document.getElementById('btnPrev').disabled=A.idx===0;
  document.getElementById('btnSkip').style.display=answered?'none':'';
  document.getElementById('btnNext').style.display=answered?'':'none';

  // Timer (only for unanswered)
  clearInterval(A.ti);
  if(!answered) startTimer();
}

function jumpTo(i){
  // Can always navigate to any question
  A.idx=i; renderQ();
}
function goPrev(){if(A.idx>0){A.idx--;renderQ();}}
function goNext(){
  A.idx++;
  if(A.idx>=A.qs.length){endQuiz();return;}
  renderQ();
}
function goSkip(){
  A.ans[A.idx]={choice:'—',isOk:false,skipped:true};
  A.idx++;
  if(A.idx>=A.qs.length){
    // Check if any unanswered remain
    const firstUnanswered=A.qs.findIndex((_,i)=>A.ans[i]===undefined);
    if(firstUnanswered>=0){A.idx=firstUnanswered;renderQ();return;}
    endQuiz();return;
  }
  renderQ();
}

let TMAX=90;
function startTimer(){
  let t=TMAX;
  const fill=document.getElementById('tFill');
  fill.style.width='100%';fill.className='tfill';
  A.ti=setInterval(()=>{
    t--;const p=t/TMAX*100;
    fill.style.width=p+'%';
    fill.className='tfill'+(p<30?' d':p<60?' w':'');
    if(t<=0)clearInterval(A.ti);
  },1000);
}

function selectAns(choice){
  clearInterval(A.ti);
  const q=A.qs[A.idx];
  const isOk=choice===q.ans;
  A.ans[A.idx]={choice,isOk,skipped:false};
  renderQ();
}

function endQuiz(){
  clearInterval(A.ti);
  const answered=Object.values(A.ans).filter(a=>!a.skipped);
  const n=A.qs.length;
  if(!answered.length){nav('home');return;}
  const ok=answered.filter(a=>a.isOk).length;
  const pct=Math.round(ok/answered.length*100);
  const skipped=Object.values(A.ans).filter(a=>a.skipped).length;
  saveScore(A.set.id,pct,ok,answered.length);

  document.getElementById('rPct').textContent=pct+'%';
  document.getElementById('rPct').style.color=pct>=80?'#b0ffcc':pct>=60?'#ffe09a':'#ffb0b0';
  document.getElementById('rLbl').textContent=`${ok} correct of ${answered.length} answered (${skipped} skipped)`;
  document.getElementById('rGrade').textContent=pct>=90?'★★★ Excellent':pct>=80?'★★☆ Good':pct>=70?'★☆☆ Pass':pct>=60?'Borderline':'Needs Work';

  document.getElementById('rStats').innerHTML=
    `<div class="stat"><div class="statv">${pct}%</div><div class="statl">Score</div></div>`+
    `<div class="stat"><div class="statv">${ok}</div><div class="statl">Correct</div></div>`+
    `<div class="stat"><div class="statv">${answered.length-ok}</div><div class="statl">Wrong</div></div>`+
    `<div class="stat"><div class="statv">${skipped}</div><div class="statl">Skipped</div></div>`;

  let rev='';
  A.qs.forEach((q,i)=>{
    const a=A.ans[i];
    if(!a)return; // unanswered (shouldn't happen at end)
    const cls=a.skipped?'sk':a.isOk?'ok':'wr';
    rev+=`<div class="ritem ${cls}">
      <div class="rq">Q${i+1}: ${q.q.substring(0,110)}${q.q.length>110?'…':''}</div>
      <div class="ra">${a.skipped
        ?'<span style="color:var(--wrn)">— Skipped</span>'
        :`You: <span class="${a.isOk?'aok':'abad'}">${a.choice}</span>`+
         (!a.isOk?` · Correct: <span class="aok">${q.ans}</span>`:'')
      } <span style="color:var(--txt3);margin-left:6px;font-size:.7rem">${q.source||''}</span></div>
    </div>`;
  });
  document.getElementById('rReview').innerHTML=rev;
  document.getElementById('tRes').style.display='';
  nav('results');
  renderHome();
}

function retakeWrong(){
  const wrong=A.qs.filter((_,i)=>A.ans[i]&&!A.ans[i].isOk&&!A.ans[i].skipped);
  const skipped=A.qs.filter((_,i)=>A.ans[i]?.skipped);
  const retry=[...wrong,...skipped];
  if(!retry.length){alert('No wrong or skipped answers!');return;}
  A.qs=retry; A.idx=0; A.ans={};
  nav('quiz'); renderQ();
}

// ── Flashcards ────────────────────────────────────────────────────────
function buildFcFilter(){
  const sel=document.getElementById('fcCh');
  const chs=[...new Set(ALL.map(q=>String(q.id).split('.')[0]))].sort();
  chs.forEach(c=>{
    const o=document.createElement('option');
    o.value=c;o.textContent=c.toUpperCase();sel.appendChild(o);
  });
  loadFC();
}
function loadFC(){
  const ty=document.getElementById('fcType').value;
  const ch=document.getElementById('fcCh').value;
  let qs=ALL;
  if(ty==='trap') qs=qs.filter(q=>q.trap);
  else if(ty!=='all') qs=qs.filter(q=>q.type===ty);
  if(ch!=='all') qs=qs.filter(q=>String(q.id).startsWith(ch));
  fcDeck=qs; fcIdx=0;
  document.getElementById('fcT').textContent=qs.length;
  renderFC();
}
function renderFC(){
  if(!fcDeck.length){document.getElementById('fcQ').textContent='No cards.';return;}
  const q=fcDeck[fcIdx];
  document.getElementById('fcN').textContent=fcIdx+1;
    const optsHtml=Object.entries(q.opts).map(([k,v])=>`<div style="margin:3px 0"><b style="color:var(--pri)">${k}.</b> ${v}</div>`).join('');
  document.getElementById('fcQ').innerHTML=`<div style="font-weight:600;margin-bottom:10px;line-height:1.5">${q.q}</div>${optsHtml}`;
  const exp=(window.QUIZ_EXP&&window.QUIZ_EXP[q.id])||q.exp||'';
  const expClean=exp.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
  document.getElementById('fcA').innerHTML=`<div style="font-size:.95rem;font-weight:700;color:#1e6b38;margin-bottom:8px">✓ Answer ${q.ans}: ${q.opts[q.ans]}</div><div style="font-size:.83rem;line-height:1.6">${expClean}</div><div style="font-size:.7rem;color:#888;margin-top:8px;font-style:italic">${q.source||''}</div>`;
  document.getElementById('fcCard').classList.remove('flip');
  document.getElementById('fcProg').textContent=`${fcIdx+1}/${fcDeck.length} · ✓ ${fcKnown.size} known · ✗ ${fcToReview.size} to review`;
  document.getElementById('fcKnown').textContent='';
}
function fcFlip(){document.getElementById('fcCard').classList.toggle('flip');}
function fcPrev(){if(fcIdx>0){fcIdx--;renderFC();}}
function fcNext(){if(fcIdx<fcDeck.length-1){fcIdx++;renderFC();}}
function fcKnow(){if(fcDeck[fcIdx]){fcKnown.add(fcDeck[fcIdx].id);fcToReview.delete(fcDeck[fcIdx].id);}fcNext();}
function fcStudy(){if(fcDeck[fcIdx]){fcToReview.add(fcDeck[fcIdx].id);fcKnown.delete(fcDeck[fcIdx].id);}fcNext();}

// ── Tracker ───────────────────────────────────────────────────────────
function renderTracker(){
  const scores=LS.get('csp_v2')||{};
  let html='';
  SETS.forEach(set=>{
    const best=getBest(set.id,scores); if(best===null)return;
    const cls=best>=80?'sb-ok':best>=60?'sb-mid':'sb-lo';
    html+=`<div class="trow">
      <div class="trow-l">${set.label}</div>
      <div class="sbar-w"><div class="sbar ${cls}" style="width:${best}%"></div></div>
      <div class="trow-m">${best}% best · ${scores[set.id].length} attempt(s) · last ${scores[set.id][0].d}</div>
    </div>`;
  });
  document.getElementById('trackerContent').innerHTML=html||'<p style="color:var(--txt3)">No attempts yet.</p>';
}
function clearAll(){if(confirm('Clear all progress?')){LS.del('csp_v2');renderHome();renderTracker();}}
function exportData(){
  const b=new Blob([JSON.stringify(LS.get('csp_v2')||{},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='CSP_progress_'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function importData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{LS.set('csp_v2',JSON.parse(e.target.result));renderHome();alert('Progress imported.');}catch{alert('Invalid file.');}};
  r.readAsText(f);ev.target.value='';
}

    {id:"1.3",q:"Earthquake origination point on the earth SURFACE is designated as:",opts:{A:"the focal depth",B:"the epicenter",C:"the focus",D:"the dip angle"},ans:"B",type:"concept",trap:true,exp:""},
    {id:"1.4",q:"When an earth plate slides BENEATH another plate, the movement is known as:",opts:{A:"subduction",B:"slip dip",C:"sea floor ridge",D:"strike slip"},ans:"A",type:"concept",exp:""},
    {id:"1.5",q:"California San Andreas fault movement is classified as:",opts:{A:"right lateral",B:"normal",C:"oblique",D:"left-lateral"},ans:"A",type:"concept",trap:true,exp:""},
    {id:"1.6",q:"Which is INCORRECT for seismic waves?",opts:{A:"Rayleigh waves produce motion in the vertical plane",B:"shear waves are at right angles to compression waves",C:"S-waves displace materials just ahead and behind the wave travel direction",D:"compression, shear and surface waves are seismic waves"},ans:"C",type:"concept",trap:true,exp:""},
    {id:"1.7",q:"When a Tsunami wave approaches land:",opts:{A:"wave velocity increases",B:"wave height decreases",C:"both wave velocity and height increase",D:"wave velocity DECREASES and wave height INCREASES"},ans:"D",type:"concept",trap:true,exp:""},
    {id:"1.8",q:"Which is INCORRECT for S-waves?",opts:{A:"S-waves travel more slowly than P-waves",B:"S-waves transmit more energy than P-waves",C:"S-waves cause LESS damage to structures than P-waves",D:"S-waves cause damage near earthquake epicenter"},ans:"C",type:"concept",trap:true,exp:""},
    {id:"1.9",q:"A Tsunami can be best described as:",opts:{A:"seismic wave",B:"seismic water wave",C:"Japanese nomenclature",D:"wide-spread damage due to seismic activities"},ans:"B",type:"concept",exp:""},
    {id:"1.10",q:"Earthquakes are generated by which of the following?",opts:{A:"volcanic eruptions",B:"deep artificially induced explosions",C:"snap of rock formations within the earth crust",D:"all of the above"},ans:"D",type:"concept",exp:""},
    {id:"1.11",q:"Which is correct for P-waves?",opts:{A:"P-waves produce motion in the vertical plane",B:"P-waves cause greater damage far from epicenter",C:"P-waves displace materials just ahead and behind the waves' direction of travel",D:"P-waves travel more slowly than S-waves"},ans:"C",type:"concept",exp:""},
    {id:"1.12",q:"Which sketch describes a right lateral normal fault? [Diagram shows 4 fault block diagrams (a)–(d)]",opts:{A:"A",B:"B",C:"C",D:"D"},ans:"B",type:"concept",trap:true,exp:""},
    {id:"1.13",q:"When a FOOT wall moves down the hanging wall along the fault plane, the fault is:",opts:{A:"strike slip",B:"reverse",C:"normal",D:"left lateral"},ans:"B",type:"concept",trap:true,exp:""},
    {id:"1.14",q:"Distance between earthquake origination point on the surface and the point where energy is released is:",opts:{A:"the focal depth",B:"the epicenter",C:"the focus",D:"the dip angle"},ans:"A",type:"concept",exp:""},
    {id:"1.15",q:"Which best defines fault creep?",opts:{A:"continuous and intermittent slow movement without noticeable earthquake",B:"sudden displacement along fault plane",C:"fault movement that does not break through to the ground surface",D:"None of the above"},ans:"A",type:"concept",exp:""},
  ]},

  ch2:{id:"ch2",label:"Chapter 2 – Ground Motion & Measurement",topic:"Ground Motion",chapters:[2],questions:[
    {id:"2.1",q:"Which quantifies the HAZARD LEVEL of earthquake ground motion?",opts:{A:"probability of exceedance",B:"Richter scale",C:"Modified Mercalli scale",D:"length of fault rupture"},ans:"A",type:"concept",exp:""},
    {id:"2.2",q:"Which is correct for earthquake magnitude?",opts:{A:"magnitude is derived from peak ground acceleration",B:"magnitude is determined from the logarithm of the recorded amplitude",C:"magnitude does not depend on fault slip length",D:"magnitude is expressed in Roman numerals (I–XII)"},ans:"B",type:"concept",trap:true,exp:""},
    {id:"2.3",q:"The Modified Mercalli scale is used for assessing:",opts:{A:"earthquake magnitude",B:"earthquake attenuation",C:"earthquake intensity",D:"earthquake hazard"},ans:"C",type:"concept",trap:true,exp:""},
    {id:"2.4",q:"The Modified Mercalli scale categorizes earthquake intensities into how many levels?",opts:{A:"9",B:"10",C:"11",D:"12"},ans:"D",type:"concept",exp:""},
    {id:"2.5",q:"Earthquake attenuation of ground motions indicates:",opts:{A:"an increase in Surface waves amplitude near epicenter",B:"a decrease in seismic energy far from epicenter",C:"a geologic formation to amplify seismic waves",D:"an earthquake fault oriented parallel to the site"},ans:"B",type:"concept",exp:""},
    {id:"2.6",q:"A seismometer is used to measure:",opts:{A:"earthquake magnitude",B:"focal depth",C:"earthquake attenuation",D:"earthquake displacement amplitude"},ans:"D",type:"concept",exp:""},
    {id:"2.7",q:"Earthquake attenuation of ground motions is NOT influenced by:",opts:{A:"earthquake magnitude",B:"soil conditions",C:"path line and length",D:"focal depth"},ans:"A",type:"concept",trap:true,exp:""},
    {id:"2.8",q:"An increase in earthquake magnitude by TWO whole numbers represents (vibration amplitude):",opts:{A:"10× increase",B:"20× increase",C:"100× increase",D:"1000× increase"},ans:"C",type:"calc",trap:true,exp:""},
    {id:"2.9",q:"An increase in earthquake magnitude by TWO whole numbers represents (energy release):",opts:{A:"10× increase",B:"20× increase",C:"100× increase",D:"1000× increase"},ans:"D",type:"calc",trap:true,exp:""},
    {id:"2.10",q:"Which best describes the Richter Scale?",opts:{A:"a logarithmic scale to measure vibration amplitude",B:"a logarithmic scale to determine the strength of an earthquake",C:"a logarithmic scale to measure ground displacement",D:"a logarithmic scale to measure fault area×slip×rigidity"},ans:"B",type:"concept",exp:""},
    {id:"2.11",q:"Which is NOT a geotechnical seismic hazard?",opts:{A:"lateral spreading",B:"liquefaction",C:"landslides",D:"ground motion attenuation"},ans:"D",type:"concept",trap:true,exp:""},
    {id:"2.12",q:"Most notable lesson from Northridge earthquake (1994):",opts:{A:"vulnerability of welded steel frames buildings",B:"soft soil amplification",C:"accelerometer data from instrumented buildings",D:"building tilt and settlement due to liquefaction"},ans:"A",type:"concept",exp:""},
    {id:"2.13",q:"Ground motions are greatly amplified when passing through geologic formation mostly composed of:",opts:{A:"stiff clay",B:"loose sand",C:"soft clay",D:"soft rock"},ans:"C",type:"concept",exp:""},
    {id:"2.14",q:"As a result of Long Beach earthquake (1933), responsibility for approving public school design was assigned to DSA. This is known as:",opts:{A:"Riley Act",B:"Field Act",C:"Saving Our School Act",D:"Thomas Act"},ans:"B",type:"concept",trap:true,exp:""},
    {id:"2.15",q:"A well-designed building that experienced CONSIDERABLE DAMAGE during an earthquake is assigned MM Intensity:",opts:{A:"VIII",B:"IX",C:"X",D:"XI"},ans:"B",type:"concept",exp:""},
    {id:"2.16",q:"Resonance amplifies vibration amplitude when:",opts:{A:"earthquake period coincides with the site period",B:"building period coincides with the earthquake period",C:"site period coincides with the building period",D:"all of the above"},ans:"D",type:"concept",trap:true,exp:""},
    {id:"2.17",q:"Determine the return period for a hazard level of 3% in 75 years:",opts:{A:"500 year event",B:"1000 year event",C:"2000 year event",D:"2500 year event"},ans:"D",type:"calc",exp:""},
    {id:"2.18",q:"Which is likely to cause MORE damage during an earthquake?",opts:{A:"larger duration of ground shaking",B:"larger distance to epicenter",C:"larger primary seismic waves",D:"larger attenuation of ground shaking"},ans:"A",type:"concept",exp:""},
    {id:"2.19",q:"A 20-story building with large natural period is likely to have resonance with:",opts:{A:"soft rock soil conditions",B:"shear waves",C:"Rayleigh waves",D:"loose sand soil conditions"},ans:"C",type:"concept",exp:""},
    {id:"2.20",q:"Which conditions are most likely to cause more damage to a structure?",opts:{A:"large PGA, large distance, old age structure",B:"small PGA, small distance, new construction",C:"large duration, soft rock, new construction",D:"large duration, liquefaction potential, poor seismic detailing"},ans:"D",type:"concept",exp:""},
    {id:"2.21",q:"Which best describes the frequency content of earthquake ground motion?",opts:{A:"the distribution of predominant frequencies in the earthquake time record",B:"the number of complete cycles of vibration per second",C:"the change in predominant frequency due to local site effect",D:"the change in predominant frequency due to source effect"},ans:"A",type:"concept",exp:""},
    {id:"2.22",q:"Magnitude 6.5 compared to magnitude 3.5 — increase in vibration amplitude?",opts:{A:"100×",B:"1,000×",C:"10,000×",D:"100,000×"},ans:"B",type:"calc",exp:""},
    {id:"2.23",q:"An isoseismal map shows:",opts:{A:"contours of equal maximum ground displacement",B:"contours of equal peak ground acceleration",C:"contours of equal earthquake magnitude",D:"contours of equal earthquake intensity"},ans:"D",type:"concept",exp:""},
    {id:"2.24",q:"Which is correct for a building's fundamental period of vibration?",opts:{A:"period that resonates with soil period",B:"inverse of the largest frequency of vibration",C:"the LARGEST of all periods",D:"the smallest of all periods"},ans:"C",type:"concept",exp:""},
    {id:"2.25",q:"A 5-story building compared to a 10-story building:",opts:{A:"shorter building has higher site period",B:"shorter building has higher natural period",C:"shorter building has lower natural frequency",D:"shorter building has lower natural period"},ans:"D",type:"concept",exp:""},
    {id:"2.26",q:"The California Act that set minimum standards for lateral force resistance in ALL structures is the:",opts:{A:"Field Act",B:"Riley Act",C:"Schwarzenegger Act",D:"Administrative Procedure Act"},ans:"B",type:"concept",trap:true,exp:""},
    {id:"2.27",q:"Which quantifies the RISK LEVEL of earthquake ground motion?",opts:{A:"probability of collapse",B:"probability of exceedance",C:"building fragility curve",D:"probability of building performance"},ans:"A",type:"concept",trap:true,exp:""},
    {id:"2.28",q:"A 200-ft tall building on mat foundation — which soil is WORST?",opts:{A:"deep soft rock",B:"deep soft clay (bay mud)",C:"deep dense sand",D:"deep loose sand"},ans:"B",type:"concept",exp:""},
    {id:"2.29",q:"Probability of building collapse depends on:",opts:{A:"fragility curve × Richter scale",B:"fragility curve × intensity index",C:"EQ hazard ground motion × fault slip",D:"EQ hazard ground motion × building fragility curve"},ans:"D",type:"concept",exp:""},
    {id:"2.30",q:"The term MCEᴳ refers to:",opts:{A:"maximum considered earthquake for geometric mean ground motion",B:"maximum considered earthquake for maximum orientation ground motion",C:"maximum consistent earthquake for geometric mean",D:"maximum credible earthquake for geometric mean"},ans:"A",type:"concept",trap:true,exp:""},
  ]},

  ch3:{id:"ch3",label:"Chapter 3 – Structural Dynamics & SDOF",topic:"Structural Dynamics",chapters:[3],questions:[
    {id:"3.1",q:"Member's rigidity can best be described as:",opts:{A:"inverse of member's deflection",B:"inverse of member's stiffness",C:"inverse of member's ductility",D:"inverse of member's damping"},ans:"A",type:"concept",exp:""},
    {id:"3.2",q:"For a SDOF, when mass m increases, what happens to T and V?",opts:{A:"T decreases, V increases",B:"T decreases, V decreases",C:"T increases, V increases",D:"T increases, V decreases"},ans:"C",type:"concept",exp:""},
    {id:"3.3",q:"Equivalent stiffness? k₁=80 k/in, k₂=60 k/in, k₃=40 k/in [k₂ and k₃ in series, result in parallel with k₁]",opts:{A:"27 k/in",B:"34 k/in",C:"104 k/in",D:"180 k/in"},ans:"C",type:"calc",exp:""},
    {id:"3.4",q:"Spectral velocity of a SDOF system is:",opts:{A:"minimum velocity from ground motion",B:"average velocity from ground motion",C:"max acceleration × angular frequency",D:"max displacement × angular frequency"},ans:"D",type:"concept",exp:""},
    {id:"3.5",q:"Maximum acceleration experienced by a building from a specific ground motion is:",opts:{A:"peak ground acceleration (PGA)",B:"dynamic acceleration",C:"spectral acceleration (Sₐ)",D:"maximum velocity relative to ground"},ans:"C",type:"concept",exp:""},
    {id:"3.6",q:"Natural period of SDOF 2: Fixed-Fixed, W₁=W₂=W, I₁=2I₂, H₁=2H₂",opts:{A:"0.50 T₁",B:"0.85 T₁",C:"2.50 T₁",D:"3.50 T₁"},ans:"B",type:"calc",exp:""},
    {id:"3.7",q:"Ratio of shear forces to three columns? Same H, E, BC. 4I₁=2I₂=I₃",opts:{A:"1/7 F, 2/7 F, 4/7 F",B:"4/7 F, 2/7 F, 1/7 F",C:"1/3 F, 1/3 F, 1/3 F",D:"-4/6 F, -2/6 F, 1.0 F"},ans:"A",type:"calc",exp:""},
    {id:"3.8",q:"Natural period T of a SDOF is determined from:",opts:{A:"structure response spectrum",B:"equivalency to linear frequency",C:"inverse of the system's weight",D:"system's mass and stiffness"},ans:"D",type:"concept",exp:""},
    {id:"3.9",q:"Damping of an oscillating SDOF is the decay of amplitude with time:",opts:{A:"True — this is the definition",B:"False — damping is the ratio of critical damping",C:"False — damping = energy dissipation only",D:"True — confirmed by AEI"},ans:"D",type:"concept",exp:""},
    {id:"3.10",q:"Higher modes have higher frequencies (shorter periods):",opts:{A:"False — higher modes = longer periods",B:"True (AEI confirms)",C:"False — frequency and period are directly proportional",D:"True — but only for MDOF"},ans:"B",type:"concept",exp:""},
    {id:"3.11",q:"Critical damping = amount of damping that brings system to rest in shortest possible time WITHOUT oscillation:",opts:{A:"True",B:"False — overdamped is fastest",C:"False — underdamped is fastest",D:"True — 5% is critical damping"},ans:"A",type:"concept",exp:""},
    {id:"3.12",q:"Sₐ=0.75g, T=0.5 sec. Find spectral displacement Sd. (g=386 in/s²)",opts:{A:"0.5 in",B:"1.84 in",C:"3.5 in",D:"7.2 in"},ans:"B",type:"calc",exp:""},
    {id:"3.13",q:"Natural period = time between successive peaks or valleys, also called fundamental period:",opts:{A:"True",B:"False — it is peak-to-peak only",C:"True (AEI confirms)",D:"False — fundamental only applies to MDOF"},ans:"D",type:"concept",exp:""},
    {id:"3.14",q:"Response spectrum = graph of maximum responses of SDOF systems to a specified ground motion:",opts:{A:"True",B:"False — only elastic systems",C:"True — for specified damping ratio",D:"False — only for buildings"},ans:"A",type:"concept",exp:""},
    {id:"3.15",q:"MDOF response adequately represented by modes contributing >90% of participating mass:",opts:{A:"True",B:"False — AEI key: 90% is per ASCE 7 requirement",C:"True — 90% per ASCE 7 §12.9",D:"False — 95% required"},ans:"B",type:"concept",exp:""},
    {id:"3.17",q:"T for W=1000 kips, k_eq=660 k/in, g=386 in/s²:",opts:{A:"0.25 sec",B:"0.39 sec",C:"0.55 sec",D:"1.20 sec"},ans:"B",type:"calc",exp:""},
    {id:"3.18",q:"Base shear: W=1000 kips, Sₐ=0.75g",opts:{A:"500 kips",B:"650 kips",C:"750 kips",D:"1000 kips"},ans:"C",type:"calc",exp:""},
    {id:"3.19",q:"Column 2 force: k₂=54.6 k/in (fixed-pin, I₂, H₂=24'), k_eq=658.8 k/in, V=750 kips",opts:{A:"35 kips",B:"47 kips",C:"62 kips",D:"75 kips"},ans:"C",type:"calc",exp:""},
    {id:"3.20",q:"Moment at top of fixed-pin column: F₂=62.2 kips, H₂=24 ft",opts:{A:"748 k·ft",B:"993 k·ft",C:"1493 k·ft",D:"1792 k·ft"},ans:"C",type:"calc",exp:""},
    {id:"3.22",q:"Period of vibration: one full cycle rest-A-rest-B-rest takes 0.2 sec each quarter:",opts:{A:"0.1 sec",B:"0.4 sec",C:"0.8 sec",D:"1.6 sec"},ans:"C",type:"calc",exp:""},
    {id:"3.25",q:"For a SDOF with various periods, maximum moment is function of:",opts:{A:"largest acceleration and longest lever arm (beam height)",B:"smallest acceleration and shortest height",C:"average acceleration",D:"fundamental mode only"},ans:"A",type:"concept",exp:""},
  ]},

  ch4:{id:"ch4",label:"Chapter 4 – IBC/ASCE 7 Codes & Provisions",topic:"Seismic Codes",chapters:[4],questions:[
    {id:"4.1",q:"The IBC:",opts:{A:"is a California-only code",B:"applies only to essential facilities",C:"is a regional code updated every 5 years",D:"is a national code replacing 3 regional codes, updated every 3 years, reflects earthquake lessons"},ans:"D",type:"concept",exp:""},
    {id:"4.2",q:"Most severe earthquake effects considered by IBC is termed:",opts:{A:"Design Earthquake (DE)",B:"Maximum Considered Earthquake (MCE)",C:"Risk-Targeted MCE (MCEᴿ)",D:"Operational Basis Earthquake (OBE)"},ans:"B",type:"concept",trap:true,exp:""},
    {id:"4.3",q:"California Highway Bridges are designed using:",opts:{A:"AASHTO 2012 with CA amendments by Caltrans",B:"IBC only",C:"CBC only",D:"FEMA guidelines"},ans:"A",type:"concept",exp:""},
    {id:"4.4",q:"CBC reproduces IBC by:",opts:{A:"direct adoption with no changes",B:"reference and articles",C:"reference/articles AND amends specific articles for DSA (schools) and OSHPD (hospitals)",D:"replacing IBC entirely"},ans:"C",type:"concept",exp:""},
    {id:"4.5",q:"Main purpose of IBC seismic provisions during major earthquake:",opts:{A:"avoid catastrophic loss of lives; important structures remain functional; limited damage at predetermined locations acceptable",B:"prevent any structural damage",C:"ensure immediate reoccupancy",D:"eliminate damage to nonstructural components"},ans:"A",type:"concept",exp:""},
    {id:"4.6",q:"A California IBC building:",opts:{A:"only resists seismic forces",B:"only resists wind forces",C:"is always detailed for seismic AND designed for larger of seismic or wind",D:"uses separate independent design for seismic and wind"},ans:"C",type:"concept",exp:""},
    {id:"4.7",q:"CBC is also known as:",opts:{A:"California Code of Regulations, Title 24, Part 2",B:"Title 24, Part 1",C:"Title 8, Part 4",D:"California Code of Regulations, Title 8"},ans:"A",type:"concept",exp:""},
    {id:"4.8",q:"California Title 24, Part 8 provides design standards for:",opts:{A:"new commercial buildings",B:"Historical Buildings",C:"essential facilities",D:"industrial structures"},ans:"B",type:"concept",exp:""},
    {id:"4.9",q:"California Existing Building Code (CEBC) provides minimum standards for:",opts:{A:"new unreinforced masonry buildings",B:"existing reinforced concrete buildings",C:"existing unreinforced masonry buildings",D:"all existing buildings"},ans:"C",type:"concept",exp:""},
    {id:"4.10",q:"The Field Act regulates state inspection for:",opts:{A:"all public buildings",B:"fire stations and hospitals",C:"hospitals and public schools",D:"public schools only"},ans:"C",type:"concept",exp:""},
    {id:"4.11",q:"Large public assembly building is RC III; all other structures are Risk Category IV:",opts:{A:"True",B:"False — large public assembly can be RC III or IV depending on occupancy",C:"True — only hospitals are RC IV",D:"False — large public assembly is RC II"},ans:"B",type:"concept",trap:true,exp:""},
    {id:"4.12",q:"A small medical facility (occupant load >50) WITHOUT surgery room or ER is:",opts:{A:"RC I",B:"RC II",C:"RC III",D:"RC IV"},ans:"C",type:"concept",trap:true,exp:""},
    {id:"4.13",q:"When site soil properties are unknown, IBC/ASCE 7 permits use of:",opts:{A:"Site Class A",B:"Site Class B",C:"Site Class C",D:"Site Class D"},ans:"D",type:"concept",exp:""},
    {id:"4.14",q:"4-story office building, each floor has 1 public assembly hall (400 occupants each). Risk Category?",opts:{A:"RC I",B:"RC II",C:"RC III",D:"RC IV"},ans:"C",type:"concept",trap:true,exp:""},
    {id:"4.15",q:"Sₘₛ refers to:",opts:{A:"mapped MCEᴿ short-period acceleration only",B:"mapped MCEᴿ short-period (0.2 sec) acceleration ADJUSTED for site conditions",C:"design spectral response at 0.2 sec",D:"site-independent spectral acceleration"},ans:"B",type:"concept",exp:""},
    {id:"4.16",q:"The term Fᵥ refers to:",opts:{A:"the velocity of the soil site class",B:"the long-period site coefficient",C:"the short-period site coefficient",D:"fundamental period amplification"},ans:"A",type:"concept",exp:""},
    {id:"4.17",q:"RC IV (Iₑ>1.0) vs RC II (Iₑ=1.0): RC IV building is designed for:",opts:{A:"smaller seismic forces and more inelastic demand",B:"same forces, more ductility",C:"smaller forces and higher damage level",D:"LARGER forces, LESS inelastic demand, LOWER damage level"},ans:"D",type:"concept",trap:true,exp:""},
    {id:"4.18",q:"IBC classifies structures into SDC to:",opts:{A:"provide restrictions on buildings with irregularities",B:"determine occupancy",C:"simplify design",D:"replace site-specific analysis"},ans:"A",type:"concept",exp:""},
    {id:"4.19",q:"Moderate seismic risk → SDC =",opts:{A:"A",B:"B",C:"C",D:"D"},ans:"C",type:"concept",exp:""},
    {id:"4.20",q:"IBC/ASCE 7 provisions are NOT applicable to:",opts:{A:"hospitals",B:"water tanks",C:"hydraulic structures, buried utility lines, electrical transmission towers",D:"bridges and highway structures"},ans:"D",type:"concept",exp:""},
    {id:"4.21",q:"Group I-3 occupancy → RC = III. Importance factor Iₑ =",opts:{A:"1.0",B:"1.1",C:"1.25",D:"1.5"},ans:"C",type:"concept",exp:""},
    {id:"4.22",q:"IBC seismic design philosophy provides minimum requirements to avoid catastrophic failure allowing for predetermined damage:",opts:{A:"False — IBC requires no damage",B:"True",C:"False — IBC prevents all structural damage",D:"False — applies only to nonstructural"},ans:"B",type:"concept",exp:""},
    {id:"4.23",q:"A structure designed per IBC is NOT safe to resist damage caused by:",opts:{A:"moderate earthquakes",B:"frequent small earthquakes",C:"the design EQ level",D:"landslide, liquefaction, direct fault displacement — all of the above"},ans:"D",type:"concept",exp:""},
    {id:"4.24",q:"The risk target for MCEᴿ (IBC/ASCE 7 basis) is:",opts:{A:"1% probability of collapse in 50 years",B:"10% probability of fragility in 50 years",C:"2% probability of exceedance in 50 years",D:"2% probability of collapse in 50 years"},ans:"A",type:"concept",trap:true,exp:""},
    {id:"4.25",q:"MCEᴿ best defined as:",opts:{A:"most severe EQ for geometric mean PGA with targeted risk adjustment",B:"most severe EQ for maximum orientation, WITHOUT risk adjustment",C:"most severe EQ for maximum orientation, WITH risk adjustment",D:"most severe EQ for geometric mean, without risk adjustment"},ans:"C",type:"concept",exp:""},
    {id:"4.26",q:"Serviceability limit states ensures:",opts:{A:"adequate rigidity to resist factored loads",B:"adequate capacity for factored loads",C:"adequate stiffness to limit deflection and drift",D:"limited use after major earthquake"},ans:"C",type:"concept",exp:""},
    {id:"4.27",q:"Lateral Load Path best describes:",opts:{A:"termed Seismic Force Resisting System",B:"complete and continuous trace of lateral load",C:"fully identified on Contract Plans",D:"all of the above"},ans:"D",type:"concept",exp:""},
    {id:"4.28",q:"SDC assignment is based on:",opts:{A:"ground motion parameters only",B:"ground motion parameters AND Risk Category",C:"Risk Category only",D:"local jurisdiction assignment"},ans:"B",type:"concept",exp:""},
    {id:"4.30",q:"Importance Factor Iₑ for RC IV essential facilities:",opts:{A:"1.0",B:"1.1",C:"1.25",D:"1.5"},ans:"D",type:"concept",exp:""},
    {id:"4.31",q:"Short-period design spectral acceleration Sds is:",opts:{A:"Sds = Fₐ × Sₛ",B:"Sds = (2/3) × Sₘₛ = (2/3) × Fₐ × Sₛ",C:"Sds = Sₘₛ / Fₐ",D:"Sds = Sₛ × Fᵥ"},ans:"B",type:"concept",exp:""},
    {id:"4.33",q:"MCEᴳ peak ground acceleration (PGAM) per ASCE 7 §11.2 is used for:",opts:{A:"determination of soil liquefaction parameters",B:"maximum orientation PGA",C:"spectral response MCE parameters",D:"site coefficients Fₐ and Fᵥ"},ans:"A",type:"concept",trap:true,exp:""},
    {id:"4.34",q:"Design Response Spectrum vs MCEᴿ Response Spectrum:",opts:{A:"Design = (3/2) × MCEᴿ",B:"Design has 2% probability of collapse in 50 years",C:"Design has 2% exceedance in 50 yr; MCEᴿ has 1% exceedance",D:"Design = (2/3) × MCEᴿ"},ans:"D",type:"concept",exp:""},
    {id:"4.35",q:"Which structure does NOT require Iₑ = 1.5?",opts:{A:"Theater with 6000 occupants",B:"5-story office with emergency preparedness center on ground floor",C:"Hospital with emergency care",D:"Water storage tank for fire suppression"},ans:"A",type:"concept",trap:true,exp:""},
  ]},

  ch5:{id:"ch5",label:"Chapter 5 – Seismic Design Criteria & ELF (AEI Q5.1–5.43 + Mini Exam + PSW)",topic:"Base Shear",chapters:[5],questions:[
    {id:"5.1",q:"Determine the risk-targeted maximum considered earthquake mapped spectral response acceleration parameters for the short and 1 second period, respectively, for a California building location that has the following coordinates: (35.00°) North and (120.00°) West?",opts:{"A":"1.25g and 0.5g","B":"1.25g and 0.3g","C":"0.95g and 0.3g","D":"0.95g and 0.5g"},ans:"A",type:"calc",source:"AEI CH05 MCQ Pg.5-8",exp:""},
